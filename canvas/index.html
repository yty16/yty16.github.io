<style>
/* ========== CSS Variables ========== */
:root {
    --bg: #f0f2f5;
    --card-bg: rgba(255, 255, 255, 0.85);

}

/* ========== Reset ========== */

/* ========== Status Bar ========== */

.status-bar span { white-space: nowrap; }

/* ========== Brush Preview ========== */

/* ========== Toast ========== */
.toast {
    position: fixed;
    top: 80px;
    left: 50%;

    -webkit-backdrop-filter: blur(20px);

    border-radius: var(--radius-sm);
    padding: 10px 24px;

}

@keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }

@keyframes toastOut {

/* ========== Responsive ========== */
@media (max-width: 768px) {

</div>

<div class="brush-preview" id="brushPreview"></div>

<div class="status-bar" id="statusBar">
    <span id="cursorPos">X: 0, Y: 0</span>
    <span class="status-separator">|</span>
    <span id="canvasSize">800 x 500</span>

<script>
(function() {
    'use strict';

    // ======= DOM Elements =======
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    const canvasContainer = document.getElementById('canvasContainer');
    const colorPalette = document.getElementById('colorPalette');
    const sizeSlider = document.getElementById('sizeSlider');
    const sizeLabel = document.getElementById('sizeLabel');
    const brushPreview = document.getElementById('brushPreview');
    const cursorPos = document.getElementById('cursorPos');
    const canvasSize = document.getElementById('canvasSize');
    const btnPen = document.getElementById('btnPen');
    const btnEraser = document.getElementById('btnEraser');
    const btnUndo = document.getElementById('btnUndo');
    const btnClear = document.getElementById('btnClear');
    const btnSave = document.getElementById('btnSave');

    // ======= State =======
    let isDrawing = false;
    let lastX = 0, lastY = 0;
    let currentTool = 'pen';
    let currentColor = '#1a1a2e';
    let brushSize = 3;
    let undoStack = [];
    const MAX_UNDO = 10;

    // ======= Color Palette =======
    const presetColors = [
        '#1a1a2e', '#000000', '#ef4444', '#f59e0b', '#22c55e',
        '#3b82f6', '#8b5cf6', '#ec4899', '#ff6b35', '#ffffff'
    ];

    function buildColorPalette() {
        presetColors.forEach(function(color) {
            var swatch = document.createElement('button');
            swatch.className = 'color-swatch';
            if (color === currentColor) swatch.classList.add('active');
            if (color === '#ffffff') swatch.classList.add('is-white');
            swatch.style.backgroundColor = color;
            swatch.addEventListener('click', function() {
                selectColor(color);
                setTool('pen');
            });
            colorPalette.appendChild(swatch);
        });

        // Custom color picker
        var customInput = document.createElement('input');
        customInput.type = 'color';
        customInput.className = 'custom-color-input';
        customInput.value = currentColor;
        customInput.addEventListener('input', function() {
            selectColor(customInput.value);
            setTool('pen');
        });
        colorPalette.appendChild(customInput);
    }

    function selectColor(color) {
        currentColor = color;
        var swatches = colorPalette.querySelectorAll('.color-swatch');
        swatches.forEach(function(s) { s.classList.remove('active'); });
        // Find and highlight the matching swatch
        swatches.forEach(function(s) {
            if (s.style.backgroundColor === color) s.classList.add('active');
        });
    }

    // ======= Canvas Resize =======
    function resizeCanvas() {
        var containerW = canvasContainer.clientWidth;
        var containerH = canvasContainer.clientHeight;
        var maxW = containerW - 32;
        var maxH = containerH - 32;

        // 4:3 aspect ratio
        var w = maxW;
        var h = w * 0.625;
        if (h > maxH) { h = maxH; w = h / 0.625; }

        // Save current drawing
        var imageData = null;
        if (canvas.width > 0 && canvas.height > 0) {
            imageData = canvas.toDataURL();
        }

        canvas.width = Math.floor(w);
        canvas.height = Math.floor(h);

        // Drawing settings
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Fill background
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        ctx.fillStyle = isDark ? '#1a1a2e' : '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Restore previous drawing
        if (imageData) {
            var img = new Image();
            img.onload = function() {
                ctx.drawImage(img, 0, 0);
            };
            img.src = imageData;
        }

        // Update status bar
        canvasSize.textContent = canvas.width + ' x ' + canvas.height;

        // Save initial state
        if (undoStack.length === 0) {
            saveState();
        }
    }

    // ======= Undo =======
    function saveState() {
        if (undoStack.length >= MAX_UNDO) {
            undoStack.shift();
        }
        undoStack.push(canvas.toDataURL());
    }

    function undo() {
        if (undoStack.length <= 1) {
            showToast('没有可撤销的操作');
            return;
        }
        undoStack.pop();
        var prevState = undoStack[undoStack.length - 1];
        var img = new Image();
        img.onload = function() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);
        };
        img.src = prevState;
    }

    // ======= Tools =======
    function setTool(tool) {
        currentTool = tool;
        btnPen.classList.toggle('active', tool === 'pen');
        btnEraser.classList.toggle('active', tool === 'eraser');
        canvas.classList.toggle('eraser-active', tool === 'eraser');
    }

    // ======= Get Position =======
    function getPos(e) {
        var rect = canvas.getBoundingClientRect();
        var scaleX = canvas.width / rect.width;
        var scaleY = canvas.height / rect.height;
        var clientX, clientY;

        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else if (e.changedTouches && e.changedTouches.length > 0) {
            clientX = e.changedTouches[0].clientX;
            clientY = e.changedTouches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }

        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    function getCanvasBg() {
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        return isDark ? '#1a1a2e' : '#ffffff';
    }

    // ======= Drawing Handlers =======
    function startDrawing(e) {
        e.preventDefault();
        isDrawing = true;
        var pos = getPos(e);
        lastX = pos.x;
        lastY = pos.y;

        // Draw a dot at the starting point
        ctx.beginPath();
        ctx.arc(lastX, lastY, brushSize / 2, 0, Math.PI * 2);
        if (currentTool === 'eraser') {
            ctx.fillStyle = getCanvasBg();
            ctx.arc(lastX, lastY, brushSize * 1.5, 0, Math.PI * 2);
        } else {
            ctx.fillStyle = currentColor;
        }
        ctx.fill();
    }

    function draw(e) {
        e.preventDefault();
        var pos = getPos(e);

        // Update cursor display
        cursorPos.textContent = 'X: ' + Math.round(pos.x) + ', Y: ' + Math.round(pos.y);

        // Update brush preview
        var clientX = e.touches ? e.touches[0].clientX : e.clientX;
        var clientY = e.touches ? e.touches[0].clientY : e.clientY;
        updateBrushPreview(clientX, clientY, true);

        if (!isDrawing) return;

        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(pos.x, pos.y);

        if (currentTool === 'eraser') {
            ctx.strokeStyle = getCanvasBg();
            ctx.lineWidth = brushSize * 2.5;
        } else {
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = brushSize;
        }
        ctx.stroke();

        lastX = pos.x;
        lastY = pos.y;
    }

    function stopDrawing(e) {
        if (isDrawing) {
            isDrawing = false;
            saveState();
        }
    }

    function updateBrushPreview(x, y, show) {
        if (currentTool === 'eraser') {
            var previewSize = brushSize * 2.5 * (canvas.width / canvas.getBoundingClientRect().width);
            brushPreview.style.backgroundColor = 'rgba(128,128,128,0.15)';
        } else {
            var previewSize = brushSize * (canvas.width / canvas.getBoundingClientRect().width);
            brushPreview.style.backgroundColor = 'transparent';
        }
        brushPreview.style.width = previewSize + 'px';
        brushPreview.style.height = previewSize + 'px';
        brushPreview.style.left = x + 'px';
        brushPreview.style.top = y + 'px';
        brushPreview.style.display = show ? 'block' : 'none';
    }

    // ======= Mouse Events =======
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseleave', function() {
        stopDrawing();
        brushPreview.style.display = 'none';
    });
    canvas.addEventListener('mouseenter', function(e) {
        updateBrushPreview(e.clientX, e.clientY, true);
    });

    // ======= Touch Events =======
    canvas.addEventListener('touchstart', startDrawing, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', stopDrawing);
    canvas.addEventListener('touchcancel', function() {
        isDrawing = false;
        brushPreview.style.display = 'none';
    });

    // ======= Actions =======
    function clearCanvas() {
        ctx.fillStyle = getCanvasBg();
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        saveState();
        showToast('画布已清空');
    }

    function saveAsPNG() {
        var link = document.createElement('a');
        link.download = '屏幕画板_' + new Date().toISOString().slice(0, 10) + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast('图片已保存');
    }

    // ======= Toast =======
    function showToast(message) {
        var existing = document.querySelector('.toast');
        if (existing) existing.remove();

        var toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);

        setTimeout(function() { toast.remove(); }, 2000);
    }

    // ======= Event Listeners =======
    sizeSlider.addEventListener('input', function() {
        brushSize = parseInt(sizeSlider.value);
        sizeLabel.textContent = brushSize;
    });

    btnPen.addEventListener('click', function() { setTool('pen'); });
    btnEraser.addEventListener('click', function() { setTool('eraser'); });
    btnUndo.addEventListener('click', undo);
    btnClear.addEventListener('click', clearCanvas);
    btnSave.addEventListener('click', saveAsPNG);

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 'z') {
            e.preventDefault();
            undo();
        }
        if (e.key === 'e' && !e.ctrlKey && !e.metaKey && document.activeElement === document.body) {
            setTool(currentTool === 'eraser' ? 'pen' : 'eraser');
        }
    });

    // Window resize
    var resizeTimer;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
            var data = canvas.toDataURL();
            resizeCanvas();
            var img = new Image();
            img.onload = function() {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
            img.src = data;
        }, 150);
    });

    // Theme change listener
    var themeObserver = new MutationObserver(function() {
        // Re-fill canvas background when theme changes
        var data = canvas.toDataURL();
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        ctx.fillStyle = isDark ? '#1a1a2e' : '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        var img = new Image();
        img.onload = function() {
            ctx.drawImage(img, 0, 0);
            saveState();
        };
        img.src = data;
    });
    themeObserver.observe(document.documentElement, {
        attributes: true,
        attributeFilter: ['data-theme']
    });

    // ======= Init =======
    function init() {
        buildColorPalette();
        resizeCanvas();
        saveState();
        sizeSlider.value = brushSize;
        sizeLabel.textContent = brushSize;
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>
</body>
</html>
