    <title>文本加密/解密</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.3);
            --text: #1a1a2e;
            --text-secondary: #666;
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
        }
        [data-theme="dark"] {
            --bg: #1a1a2e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text: #eee;
            --text-secondary: #aaa;
            --accent: #a29bfe;
            --accent-light: #6c5ce7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
            padding: 8px 16px;
            border-radius: 8px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        .back-btn:hover { background: var(--accent); color: white; }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        h1 { font-size: 28px; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--accent);
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .tab.active { background: var(--accent); color: white; }
        .tab:hover { background: var(--accent-light); color: white; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-secondary); }
        select, input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--card-border);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
        }
        textarea { min-height: 120px; resize: vertical; }
        .btn {
            padding: 12px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 12px;
        }
        .btn:hover { background: var(--accent-light); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(108,92,231,0.4); }
        .output-area {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 16px;
            min-height: 100px;
            word-break: break-all;
            white-space: pre-wrap;
            margin-bottom: 12px;
            backdrop-filter: blur(10px);
        }
        .copy-btn {
            padding: 8px 16px;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .copy-btn:hover { background: var(--accent); color: white; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .shift-group { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .shift-group input { width: 80px; margin-bottom: 0; }
    </style>
</head>
<body>
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme) {
                document.documentElement.setAttribute('data-theme', theme);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    <div class="container">
        <a href="/" class="back-btn">← 返回</a>
        <div class="card">
            <h1>🔒 文本加密/解密</h1>
            <div class="tabs">
                <button class="tab active" onclick="switchMode('encrypt')">加密</button>
                <button class="tab" onclick="switchMode('decrypt')">解密</button>
            </div>
            <label>算法选择</label>
            <select id="algorithm" onchange="togglePasswordField()">
                <option value="aes">AES-256 (需要密码)</option>
                <option value="base64">Base64</option>
                <option value="rot13">ROT13</option>
                <option value="reverse">反转文本</option>
                <option value="caesar">凯撒密码</option>
            </select>
            <div id="password-group">
                <label>密码/密钥</label>
                <input type="password" id="password" placeholder="输入加密密码..." />
            </div>
            <div id="shift-group" style="display:none;">
                <label>移位值</label>
                <div class="shift-group">
                    <input type="number" id="shift" value="3" min="1" max="25" />
                    <span style="color:var(--text-secondary);">(1-25)</span>
                </div>
            </div>
            <label>输入文本</label>
            <textarea id="inputText" placeholder="输入要处理的文本..."></textarea>
            <button class="btn" onclick="processText()">处理</button>
            <label>输出结果</label>
            <div class="output-area" id="output"></div>
            <button class="copy-btn" onclick="copyOutput()">复制结果</button>
        </div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        let currentMode = 'encrypt';

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }

        function togglePasswordField() {
            const algo = document.getElementById('algorithm').value;
            document.getElementById('password-group').style.display = algo === 'aes' ? 'block' : 'none';
            document.getElementById('shift-group').style.display = algo === 'caesar' ? 'block' : 'none';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function copyOutput() {
            const output = document.getElementById('output').textContent;
            if (!output) return showToast('没有可复制的内容');
            navigator.clipboard.writeText(output).then(() => showToast('已复制到剪贴板'));
        }

        // Base64
        function base64Encode(str) { return btoa(unescape(encodeURIComponent(str))); }
        function base64Decode(str) { return decodeURIComponent(escape(atob(str))); }

        // ROT13
        function rot13(str) {
            return str.replace(/[a-zA-Z]/g, c => {
                const base = c <= 'Z' ? 65 : 97;
                return String.fromCharCode(((c.charCodeAt(0) - base + 13) % 26) + base);
            });
        }

        // Caesar cipher
        function caesar(str, shift, decrypt = false) {
            if (decrypt) shift = (26 - shift) % 26;
            return str.replace(/[a-zA-Z]/g, c => {
                const base = c <= 'Z' ? 65 : 97;
                return String.fromCharCode(((c.charCodeAt(0) - base + shift) % 26) + base);
            });
        }

        // AES-256 using Web Crypto API
        async function aesEncrypt(text, password) {
            const salt = crypto.getRandomValues(new Uint8Array(16));
            const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
            const key = await crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false,
                ['encrypt', 'decrypt']
            );
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(text));
            const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
            combined.set(salt);
            combined.set(iv, salt.length);
            combined.set(new Uint8Array(encrypted), salt.length + iv.length);
            return btoa(String.fromCharCode(...combined));
        }

        async function aesDecrypt(data, password) {
            const combined = Uint8Array.from(atob(data), c => c.charCodeAt(0));
            const salt = combined.slice(0, 16);
            const iv = combined.slice(16, 28);
            const encrypted = combined.slice(28);
            const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
            const key = await crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
                keyMaterial,
                { name: 'AES-GCM', length: 256 },
                false,
                ['encrypt', 'decrypt']
            );
            const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, encrypted);
            return new TextDecoder().decode(decrypted);
        }

        async function processText() {
            const algo = document.getElementById('algorithm').value;
            const text = document.getElementById('inputText').value;
            const password = document.getElementById('password').value;
            const shift = parseInt(document.getElementById('shift').value) || 3;
            const output = document.getElementById('output');

            if (!text) return showToast('请输入文本');

            try {
                let result = '';
                if (algo === 'aes') {
                    if (!password) return showToast('请输入密码');
                    result = currentMode === 'encrypt' ? await aesEncrypt(text, password) : await aesDecrypt(text, password);
                } else if (algo === 'base64') {
                    result = currentMode === 'encrypt' ? base64Encode(text) : base64Decode(text);
                } else if (algo === 'rot13') {
                    result = rot13(text);
                } else if (algo === 'reverse') {
                    result = text.split('').reverse().join('');
                } else if (algo === 'caesar') {
                    result = caesar(text, shift, currentMode === 'decrypt');
                }
                output.textContent = result;
                showToast('处理成功');
            } catch (e) {
                output.textContent = '错误: ' + e.message;
                showToast('处理失败');
            }
        }
    </script>
</body>
</html>
