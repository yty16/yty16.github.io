<style>
:root{--bg:#f0f2f5;--card:rgba(255,255,255,0.85);--text:#1a1a2e;--muted:#a0aec0;--accent:#6366f1;--accent-hover:#4f46e5;--border:rgba(0,0,0,0.06);--shadow:0 4px 16px rgba(0,0,0,0.08)}
[data-theme="dark"]{--bg:#0f0f1a;--card:rgba(30,30,50,0.85);--text:#e2e8f0;--muted:#718096;--accent:#818cf8;--border:rgba(255,255,255,0.06);--shadow:0 4px 16px rgba(0,0,0,0.3)}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; }
/* 返回按钮 */
.back-btn { position: fixed; top: 20px; left: 20px; z-index: 100; display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 10px; color: var(--text); text-decoration: none; font-size: 14px; font-weight: 500; box-shadow: var(--shadow); transition: all 0.2s; }
.back-btn:hover { background: var(--accent); color: #fff; }
/* 头部 */
.header { text-align: center; padding: 50px 20px 30px; }
.header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.header p { font-size: 15px; color: var(--muted); margin-top: 8px; }
/* 游戏网格 */
.games-grid { max-width: 800px; margin: 0 auto; padding: 0 20px 60px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
.game-card { background: var(--card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 16px; padding: 24px 16px; text-align: center; text-decoration: none; color: var(--text); box-shadow: var(--shadow); transition: all 0.25s; cursor: pointer; }
.game-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); border-color: var(--accent); }
.game-icon { font-size: 40px; margin-bottom: 12px; }
.game-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.game-desc { font-size: 12px; color: var(--muted); }
/* 分区标题 */
.section-title { max-width: 800px; margin: 0 auto; padding: 30px 20px 12px; font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
/* 外部链接 */
.external-grid { max-width: 800px; margin: 0 auto; padding: 0 20px 60px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.external-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-decoration: none; color: var(--text); transition: all 0.2s; }
.external-card:hover { border-color: var(--accent); }
.external-card .name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.external-card .desc { font-size: 12px; color: var(--muted); }
/* Toast */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); padding: 12px 24px; background: var(--text); color: var(--bg); border-radius: 10px; font-size: 14px; font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,0.2); transition: transform 0.3s ease; z-index: 9999; }
.toast.show { transform: translateX(-50%) translateY(0); }
/* 响应式 */
@media (max-width: 600px) { .header h1 { font-size: 22px; } .games-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }
</style>
</head>
