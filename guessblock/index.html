<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC猜方块&生物</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        // 主题检测
        (function(){
            var s=localStorage.getItem('theme');
            var d=s==='dark'||s==='light'?s:(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
            document.documentElement.setAttribute('data-theme',d);
        })();
    </script>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: rgba(255,255,255,0.7);
            --card-border: rgba(255,255,255,0.3);
            --text: #1a1a2e;
            --text-secondary: #666;
            --accent: #6c5ce7;
            --accent2: #a29bfe;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --shadow: rgba(0,0,0,0.1);
        }
        [data-theme="dark"] {
            --bg: #0f0f1a;
            --card-bg: rgba(30,30,50,0.7);
            --card-border: rgba(255,255,255,0.1);
            --text: #e0e0e0;
            --text-secondary: #888;
            --accent: #a29bfe;
            --accent2: #6c5ce7;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --shadow: rgba(0,0,0,0.3);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            transition: background 0.3s, color 0.3s;
        }
        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3498db, #2ecc71, #e74c3c, #f39c12, #9b59b6);
        }
        .container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px var(--shadow);
            padding: 30px;
            width: 100%;
            max-width: 700px;
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .back-btn {
            position: absolute;
            top: 15px; left: 15px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1.2rem;
            transition: color 0.3s;
            z-index: 10;
        }
        .back-btn:hover { color: var(--accent); }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--accent), var(--success));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }
        #info {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 10px;
            margin: 10px 0;
            font-size: 0.95rem;
        }
        #info a {
            color: var(--accent);
            text-decoration: none;
            padding: 2px 6px;
            border-radius: 5px;
            background: rgba(108,92,231,0.1);
            transition: all 0.3s;
        }
        #info a:hover { background: rgba(108,92,231,0.3); }
        .content-box {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 25px;
            margin: 15px 0;
            backdrop-filter: blur(10px);
        }
        #loading {
            font-size: 1.1rem;
            padding: 15px;
            color: var(--text-secondary);
        }
        .spinner {
            width: 36px; height: 36px;
            margin: 12px auto;
            border: 3px solid var(--card-border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .question {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 15px 0;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
        }
        /* 特殊问题的按钮样式 */
        .btn-container.is-block-question {
            /* 方块/生物选择用不同颜色 */
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--card-border);
            border-radius: 3px;
            margin: 15px 0 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            border-radius: 3px;
            transition: width 0.3s;
        }
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            min-width: 100px;
            transition: all 0.2s;
            box-shadow: 0 4px 12px var(--shadow);
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: translateY(1px); }
        #yesButton {
            background: linear-gradient(to bottom, var(--success), #27ae60);
            color: white;
        }
        #noButton {
            background: linear-gradient(to bottom, var(--danger), #c0392b);
            color: white;
        }
        /* 方块/生物选择时的特殊按钮 */
        .btn-block {
            background: linear-gradient(to bottom, #3498db, #2980b9);
            color: white;
        }
        .btn-mob {
            background: linear-gradient(to bottom, #e74c3c, #c0392b);
            color: white;
        }
        #result {
            font-size: 1.6rem;
            margin: 20px 0;
            padding: 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .result-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 10px; }
        .result-content {
            font-size: 1.8rem;
            padding: 10px;
            background: rgba(108,92,231,0.1);
            border-radius: 8px;
        }
        .result-type {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        #restartButton {
            background: linear-gradient(to bottom, var(--warning), #e67e22);
            color: white;
            margin-top: 15px;
        }
        .hidden { display: none; }
        .footer {
            margin-top: 15px;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .question { font-size: 1.3rem; }
            .btn { padding: 10px 25px; font-size: 1rem; }
            .container { padding: 20px; min-height: 420px; }
        }
        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            .question { font-size: 1.1rem; }
            .btn-container { gap: 12px; }
            .btn { padding: 10px 18px; font-size: 0.95rem; min-width: 80px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">← 返回</a>
        <h1>🧱 MC猜方块&生物</h1>
        <div class="subtitle">V2.0 以网易基岩版为准，想一个方块或生物我来猜</div>
        <div id="info" class="hidden"></div>
        <div id="loading">
            <div class="spinner"></div>
            正在加载数据...
        </div>
        <div id="gameContainer" class="hidden">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="content-box">
                <div id="questionContainer" class="question"></div>
            </div>
            <div class="btn-container" id="btnContainer">
                <button id="yesButton" class="btn" onclick="answerQuestion('1')">是</button>
                <button id="noButton" class="btn" onclick="answerQuestion('0')">否</button>
            </div>
            <div id="result" class="hidden"></div>
        </div>
        <div class="footer">灵感来自Akinator，数据仅供参考</div>
    </div>

    <script>
        let que = [];
        let items = [];
        let data = [];
        let ans = [];
        let maxAns = 0;
        let currentQuestion = 0;
        let totalQuestions = 0;
        let isBlockMode = null; // null=未确定, true=方块, false=生物

        function loadData() {
            fetch('data.txt')
                .then(r => r.text())
                .then(text => {
                    parseData(text);
                    updateInfo();
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('gameContainer').classList.remove('hidden');
                    document.getElementById('info').classList.remove('hidden');
                    totalQuestions = que.length;
                    startGame();
                })
                .catch(err => {
                    document.getElementById('loading').innerHTML = '数据加载失败 😢';
                });
        }

        function updateInfo() {
            let blockCount = data.filter(d => d[0] === '1').length;
            let mobCount = data.filter(d => d[0] === '0').length;
            document.getElementById("info").innerHTML =
                '已收录 <b>' + blockCount + '</b> 个方块 + <b>' + mobCount + '</b> 个生物，' +
                '<a href="view.html" target="_blank">查看全部</a>';
        }

        function parseData(text) {
            var lines = text.trim().split('\n');
            var section = 0;
            for (var line of lines) {
                line = line.trim();
                if (line === '-1') { section++; continue; }
                if (section === 0) {
                    if (line) que.push(line);
                } else if (section === 1) {
                    var parts = line.split(' ');
                    if (parts.length >= 2) {
                        items.push(parts[0]);
                        data.push(parts[1]);
                    }
                }
            }
            ans = Array.from({length: items.length}, function(_, i) { return i; });
            maxAns = items.length;
        }

        function updateProgress() {
            var pct = totalQuestions > 0 ? (currentQuestion / totalQuestions * 100) : 0;
            document.getElementById('progressFill').style.width = pct + '%';
        }

        function startGame() {
            currentQuestion = 0;
            ans = Array.from({length: items.length}, function(_, i) { return i; });
            maxAns = items.length;
            isBlockMode = null;
            document.getElementById("result").classList.add("hidden");
            document.getElementById("yesButton").disabled = false;
            document.getElementById("noButton").disabled = false;
            var rb = document.getElementById("restartButton");
            if (rb) rb.remove();
            document.querySelector(".content-box").classList.remove("hidden");
            document.getElementById("btnContainer").classList.remove("hidden");
            // 恢复默认按钮
            resetButtons();
            updateProgress();
            skipQuestions();
        }

        function resetButtons() {
            var yesBtn = document.getElementById("yesButton");
            var noBtn = document.getElementById("noButton");
            yesBtn.className = 'btn';
            yesBtn.textContent = '是';
            noBtn.className = 'btn';
            noBtn.textContent = '否';
            yesBtn.onclick = function() { answerQuestion('1'); };
            noBtn.onclick = function() { answerQuestion('0'); };
        }

        // 跳过所有答案相同的无用问题
        function skipQuestions() {
            while (currentQuestion < que.length) {
                var allSame = true;
                var firstVal = null;
                for (var i = 0; i < maxAns; i++) {
                    var v = data[ans[i]][currentQuestion];
                    if (firstVal === null) firstVal = v;
                    else if (v !== firstVal) { allSame = false; break; }
                }
                if (!allSame) break;
                // 如果所有答案相同，自动跳过并记录
                if (currentQuestion === 0 && firstVal) {
                    isBlockMode = firstVal === '1';
                }
                currentQuestion++;
            }
            updateProgress();
            if (currentQuestion >= que.length || maxAns <= 1) {
                showResult();
            } else {
                showQuestion();
            }
        }

        function showQuestion() {
            var q = que[currentQuestion];
            document.getElementById("questionContainer").textContent = q;

            // 第一个问题"是方块还是生物？"用特殊按钮
            var yesBtn = document.getElementById("yesButton");
            var noBtn = document.getElementById("noButton");
            if (currentQuestion === 0) {
                yesBtn.className = 'btn btn-block';
                yesBtn.textContent = '🧱 方块';
                yesBtn.onclick = function() { answerQuestion('1'); };
                noBtn.className = 'btn btn-mob';
                noBtn.textContent = '🐷 生物';
                noBtn.onclick = function() { answerQuestion('0'); };
            } else {
                resetButtons();
            }
        }

        function answerQuestion(answer) {
            // 记录方块/生物模式
            if (currentQuestion === 0) {
                isBlockMode = answer === '1';
            }

            var next = [];
            for (var i = 0; i < maxAns; i++) {
                if (data[ans[i]][currentQuestion] === answer) next.push(ans[i]);
            }
            ans = next;
            maxAns = ans.length;
            currentQuestion++;
            updateProgress();
            skipQuestions();
        }

        function showResult() {
            var el = document.getElementById("result");
            el.innerHTML = '';
            var title = document.createElement('div');
            title.className = 'result-title';
            var content = document.createElement('div');
            content.className = 'result-content';
            var typeInfo = document.createElement('div');
            typeInfo.className = 'result-type';

            if (maxAns === 1) {
                var isBlock = data[ans[0]][0] === '1';
                title.textContent = '🎯 你想的是：';
                content.innerHTML = '<strong>' + items[ans[0]] + '</strong>';
                typeInfo.textContent = isBlock ? '（方块）' : '（生物）';
            } else if (maxAns > 1 && maxAns <= 5) {
                title.textContent = '可能是以下之一：';
                content.innerHTML = ans.map(function(i){ return '<span>' + items[i] + '</span>'; }).join('、');
                typeInfo.textContent = '共 ' + maxAns + ' 个候选';
            } else if (maxAns > 5) {
                title.textContent = '还剩 ' + maxAns + ' 个候选';
                content.innerHTML = ans.slice(0, 5).map(function(i){ return items[i]; }).join('、') + '...';
            } else {
                title.textContent = '🤔 数据库中没找到匹配';
            }

            el.appendChild(title);
            if (maxAns > 0) {
                el.appendChild(content);
                el.appendChild(typeInfo);
            }
            el.classList.remove("hidden");
            document.getElementById("yesButton").disabled = true;
            document.getElementById("noButton").disabled = true;
            document.querySelector(".content-box").classList.add("hidden");
            document.getElementById("btnContainer").classList.add("hidden");

            var rb = document.createElement('button');
            rb.textContent = '再来一次';
            rb.id = "restartButton";
            rb.className = 'btn';
            rb.onclick = startGame;
            el.insertAdjacentElement('afterend', rb);
        }

        window.onload = loadData;
    </script>
</body>
</html>
