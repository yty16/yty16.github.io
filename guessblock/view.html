    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>已收录方块&生物</title>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"></noscript>
    <script>
        (function(){
            var s=localStorage.getItem('theme');
            var d=s==='dark'||s==='light'?s:(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
            document.documentElement.setAttribute('data-theme',d);
        })();
    </script>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: rgba(255,255,255,0.7);
            --card-border: rgba(255,255,255,0.3);
            --text: #1a1a2e;
            --text-secondary: #666;
            --accent: #6c5ce7;
            --shadow: rgba(0,0,0,0.1);
        }
        [data-theme="dark"] {
            --bg: #0f0f1a;
            --card-bg: rgba(30,30,50,0.7);
            --card-border: rgba(255,255,255,0.1);
            --text: #e0e0e0;
            --text-secondary: #888;
            --accent: #a29bfe;
            --shadow: rgba(0,0,0,0.3);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.3s, color 0.3s;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px var(--shadow);
            padding: 30px;
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3498db, #2ecc71, #e74c3c, #f39c12, #9b59b6);
        }
        .back-btn {
            position: absolute;
            top: 15px; left: 15px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1.2rem;
            transition: color 0.3s;
            z-index: 10;
        }
        .back-btn:hover { color: var(--accent); }
        header { text-align: center; margin-bottom: 20px; }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--accent), #2ecc71);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            margin: 15px 0 8px;
            text-align: left;
        }
        .content-box {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
            margin-top: 15px;
        }
        .item-list {
            text-align: center;
            line-height: 2;
            font-size: 1.1rem;
            color: var(--text);
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
        }
        .item-list::-webkit-scrollbar { width: 6px; }
        .item-list::-webkit-scrollbar-track { background: var(--card-border); border-radius: 3px; }
        .item-list::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 15px;
            padding: 10px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            font-size: 1rem;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #e74c3c; margin-right: 8px; }
        .status.ready .dot { background: #2ecc71; }
        @media (max-width: 768px) {
            .container { padding: 20px; }
            h1 { font-size: 1.6rem; }
            .item-list { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回游戏</a>
        <header>
            <h1>🧱🐷 已收录方块&生物</h1>
        </header>
        <div class="content-box">
            <div class="section-title">🧱 方块</div>
            <div class="item-list" id="blockList"></div>
            <div class="section-title">🐷 生物</div>
            <div class="item-list" id="mobList"></div>
        </div>
        <div class="status" id="status">
            <div class="dot"></div>
            正在加载数据...
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var blockEl = document.getElementById('blockList');
            var mobEl = document.getElementById('mobList');
            var statusEl = document.getElementById('status');

            fetch('data.txt')
                .then(function(r) { return r.text(); })
                .then(function(text) {
                    var lines = text.split('\n');
                    var blocks = [];
                    var mobs = [];
                    var countEnd = 0;
                    for (var i = 0; i < lines.length; i++) {
                        var line = lines[i].trim();
                        if (line === '-1') {
                            countEnd++;
                            if (countEnd === 2) break;
                            continue;
                        }
                        if (countEnd === 1 && line) {
                            var parts = line.split(' ');
                            var name = parts[0];
                            var bits = parts[1] || '';
                            if (name && bits) {
                                if (bits[0] === '1') blocks.push(name);
                                else mobs.push(name);
                            }
                        }
                    }
                    statusEl.classList.add('ready');
                    blockEl.innerHTML = blocks.length > 0 ? blocks.join('、') : '暂无方块数据';
                    mobEl.innerHTML = mobs.length > 0 ? mobs.join('、') : '暂无生物数据';
                    statusEl.innerHTML = '<div class="dot"></div> 已收录 ' + blocks.length + ' 个方块 + ' + mobs.length + ' 个生物';
                })
                .catch(function() {
                    blockEl.innerHTML = '数据加载失败 😢';
                    mobEl.innerHTML = '';
                });
        });
    </script>
</body>
</html>
