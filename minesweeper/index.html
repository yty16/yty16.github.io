<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💣 扫雷</title>
<script>
(function(){var t=localStorage.getItem('theme');if(t==='dark'||(t!=='light'&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.setAttribute('data-theme','dark')})();

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f2f5;--card-bg:rgba(255,255,255,0.75);--card-border:rgba(255,255,255,0.4);--text:#2d3436;--text-secondary:#636e72;--accent:#6c5ce7;--success:#2ecc71;--danger:#e74c3c;--warning:#f39c12;--cell-bg:#dfe6e9;--cell-revealed:#b2bec3;--cell-hover:#c8d6e5}
[data-theme="dark"]{--bg:#1a1a2e;--card-bg:rgba(40,40,70,0.75);--card-border:rgba(255,255,255,0.08);--text:#e0e0e0;--text-secondary:#a0a0b0;--accent:#a29bfe;--success:#00b894;--danger:#ff6b6b;--warning:#fdcb6e;--cell-bg:#4a4a6a;--cell-revealed:#2d2d4a;--cell-hover:#5a5a7a}
body{font-family:'Inter','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;transition:background .3s,color .3s}
.back-btn{align-self:flex-start;text-decoration:none;color:var(--text-secondary);font-size:15px;padding:6px 14px;border-radius:8px;background:var(--card-bg);backdrop-filter:blur(10px);border:1px solid var(--card-border);transition:all .2s;margin-bottom:16px}
.back-btn:hover{color:var(--accent);transform:translateX(-3px)}
.container{width:100%;max-width:700px}
.title{text-align:center;font-size:28px;font-weight:700;margin-bottom:20px}
.card{background:var(--card-bg);backdrop-filter:blur(16px);border:1px solid var(--card-border);border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 8px 32px rgba(0,0,0,0.08);transition:background .3s}
.difficulty-bar{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.diff-btn{padding:8px 16px;border:2px solid var(--card-border);border-radius:10px;background:transparent;color:var(--text-secondary);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.diff-btn:hover{border-color:var(--accent);color:var(--accent)}
.diff-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.status-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px}
.mine-counter,.timer{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;min-width:60px}
.mine-counter{color:var(--danger)}
.timer{color:var(--accent);text-align:right}
.face-btn{font-size:28px;cursor:pointer;background:none;border:2px solid var(--card-border);border-radius:10px;padding:4px 10px;transition:all .15s;line-height:1}
.face-btn:hover{border-color:var(--accent);transform:scale(1.1)}
.grid-wrapper{display:flex;justify-content:center;overflow:auto;max-width:100%}
.grid{display:inline-grid;gap:2px;user-select:none}
.cell{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;border-radius:4px;cursor:pointer;transition:background .1s;background:var(--cell-bg);border:1px solid rgba(0,0,0,0.08)}
.cell:hover:not(.revealed):not(.game-over){background:var(--cell-hover)}
.cell.revealed{background:var(--cell-revealed);cursor:default}
.cell.flagged::after{content:'🚩';font-size:14px}
.cell.mine-hit{background:var(--danger)!important;color:#fff}
.cell.mine-show{background:rgba(231,76,60,0.15)}
.n1{color:#3498db}.n2{color:#27ae60}.n3{color:#e74c3c}.n4{color:#2c3e50}.n5{color:#8b0000}.n6{color:#008080}.n7{color:#000}.n8{color:#808080}
[data-theme="dark"] .n7{color:#ddd}
[data-theme="dark"] .n4{color:#74b9ff}
.game-msg{text-align:center;font-size:22px;font-weight:700;margin-top:16px;min-height:32px}
.game-msg.win{color:var(--success)}.game-msg.lose{color:var(--danger)}
@media(max-width:540px){.cell{width:26px;height:26px;font-size:13px}}

<body>
<a href="/" class="back-btn">← 返回</a>
<div class="container">
  <h1 class="title">💣 扫雷</h1>
  <div class="card">
    <div class="difficulty-bar">
      <button class="diff-btn active" data-rows="9" data-cols="9" data-mines="10">初级 9×9</button>
      <button class="diff-btn" data-rows="16" data-cols="16" data-mines="40">中级 16×16</button>
      <button class="diff-btn" data-rows="16" data-cols="30" data-mines="99">高级 30×16</button>
    </div>
    <div class="status-bar">
      <div class="mine-counter" id="mineCount">💣 10</div>
      <button class="face-btn" id="faceBtn">😊</button>
      <div class="timer" id="timerDisplay">⏱ 0</div>
    </div>
    <div class="grid-wrapper">
      <div class="grid" id="grid"></div>
    </div>
    <div class="game-msg" id="gameMsg"></div>
  </div>
</div>
<script>
(function(){
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
let rows,cols,mines,grid,revealed,flagged,mineMap,gameOver,firstClick,timer,seconds;
const NUM_COLORS=['','n1','n2','n3','n4','n5','n6','n7','n8'];

function init(r=9,c=9,m=10){
  rows=r;cols=c;mines=m;
  grid=Array.from({length:rows},()=>Array(cols).fill(0));
  revealed=Array.from({length:rows},()=>Array(cols).fill(false));
  flagged=Array.from({length:rows},()=>Array(cols).fill(false));
  mineMap=Array.from({length:rows},()=>Array(cols).fill(false));
  gameOver=false;firstClick=true;
  clearInterval(timer);seconds=0;
  $('#faceBtn').textContent='😊';
  $('#timerDisplay').textContent='⏱ 0';
  $('#mineCount').textContent='💣 '+mines;
  $('#gameMsg').textContent='';
  $('#gameMsg').className='game-msg';
  renderGrid();
}

function placeMines(safeR,safeC){
  let placed=0;
  while(placed<mines){
    const r=Math.floor(Math.random()*rows);
    const c=Math.floor(Math.random()*cols);
    if(mineMap[r][c])continue;
    if(Math.abs(r-safeR)<=1&&Math.abs(c-safeC)<=1)continue;
    mineMap[r][c]=true;placed++;
  }
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(mineMap[r][c]){grid[r][c]=-1;continue}
    let cnt=0;
    forNeighbors(r,c,(nr,nc)=>{if(mineMap[nr][nc])cnt++});
    grid[r][c]=cnt;
  }
}

function forNeighbors(r,c,fn){
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    if(!dr&&!dc)continue;
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<rows&&nc>=0&&nc<cols)fn(nr,nc);
  }
}

function renderGrid(){
  const el=$('#grid');
  el.style.gridTemplateColumns=`repeat(${cols},32px)`;
  el.innerHTML='';
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const cell=document.createElement('div');
    cell.className='cell';
    cell.dataset.r=r;cell.dataset.c=c;
    cell.addEventListener('click',()=>onLeftClick(r,c));
    cell.addEventListener('contextmenu',e=>{e.preventDefault();onRightClick(r,c)});
    el.appendChild(cell);
  }
  // responsive scaling
  requestAnimationFrame(scaleGrid);
}

function scaleGrid(){
  const gw=$('.grid-wrapper');
  const g=$('#grid');
  const maxW=gw.clientWidth-4;
  const gridW=cols*34;
  if(gridW>maxW){
    const s=maxW/gridW;
    g.style.transform=`scale(${s})`;
    g.style.transformOrigin='top center';
    g.style.height=(rows*34)*s+'px';
  }else{
    g.style.transform='';
    g.style.height='';
  }
}

function getCell(r,c){return $(`.cell[data-r="${r}"][data-c="${c}"]`)}

function onLeftClick(r,c){
  if(gameOver)return;
  if(flagged[r][c]||revealed[r][c])return;
  if(firstClick){
    firstClick=false;
    placeMines(r,c);
    startTimer();
  }
  if(mineMap[r][c]){
    // lose
    gameOver=true;clearInterval(timer);
    revealAllMines(r,c);
    $('#faceBtn').textContent='😵';
    $('#gameMsg').textContent='💥 踩雷了！';
    $('#gameMsg').className='game-msg lose';
    return;
  }
  reveal(r,c);
  checkWin();
}

function reveal(r,c){
  if(r<0||r>=rows||c<0||c>=cols)return;
  if(revealed[r][c]||flagged[r][c])return;
  revealed[r][c]=true;
  const cell=getCell(r,c);
  cell.classList.add('revealed');
  if(grid[r][c]===0){
    forNeighbors(r,c,(nr,nc)=>reveal(nr,nc));
  }else{
    cell.textContent=grid[r][c];
    cell.classList.add(NUM_COLORS[grid[r][c]]);
  }
}

function onRightClick(r,c){
  if(gameOver||revealed[r][c])return;
  flagged[r][c]=!flagged[r][c];
  const cell=getCell(r,c);
  cell.classList.toggle('flagged',flagged[r][c]);
  const flagCount=flagged.flat().filter(Boolean).length;
  $('#mineCount').textContent='💣 '+(mines-flagCount);
}

function revealAllMines(hitR,hitC){
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    const cell=getCell(r,c);
    if(mineMap[r][c]){
      if(r===hitR&&c===hitC){cell.classList.add('mine-hit');cell.textContent='💣'}
      else{cell.classList.add('revealed','mine-show');cell.textContent='💣'}
    }else if(flagged[r][c]){
      cell.style.textDecoration='line-through';cell.style.color='var(--danger)';
    }
  }
  $$('.cell').forEach(c=>c.classList.add('game-over'));
}

function checkWin(){
  let unrevealed=0;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    if(!revealed[r][c]&&!mineMap[r][c])unrevealed++;
  }
  if(unrevealed===0){
    gameOver=true;clearInterval(timer);
    $('#faceBtn').textContent='😎';
    $('#gameMsg').textContent='🎉 你赢了！';
    $('#gameMsg').className='game-msg win';
    // auto flag remaining
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
      if(mineMap[r][c]&&!flagged[r][c]){
        flagged[r][c]=true;
        getCell(r,c).classList.add('flagged');
      }
    }
    $$('.cell').forEach(c=>c.classList.add('game-over'));
  }
}

function startTimer(){
  seconds=0;
  timer=setInterval(()=>{
    seconds++;
    $('#timerDisplay').textContent='⏱ '+seconds;
  },1000);
}

// Chord click: if clicking a revealed number and flag count matches, reveal neighbors
document.addEventListener('click',e=>{
  const cell=e.target.closest('.cell');
  if(!cell)return;
  const r=+cell.dataset.r,c=+cell.dataset.c;
  if(!revealed[r][c]||grid[r][c]<=0)return;
  if(gameOver)return;
  let flagCount=0;
  forNeighbors(r,c,(nr,nc)=>{if(flagged[nr][nc])flagCount++});
  if(flagCount===grid[r][c]){
    forNeighbors(r,c,(nr,nc)=>{
      if(!revealed[nr][nc]&&!flagged[nr][nc]){
        if(mineMap[nr][nc]){
          gameOver=true;clearInterval(timer);
          revealAllMines(nr,nc);
          $('#faceBtn').textContent='😵';
          $('#gameMsg').textContent='💥 踩雷了！';
          $('#gameMsg').className='game-msg lose';
          return;
        }
        reveal(nr,nc);
      }
    });
    if(!gameOver)checkWin();
  }
});

// difficulty buttons
$$('.diff-btn').forEach(btn=>btn.addEventListener('click',()=>{
  $$('.diff-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  init(+btn.dataset.rows,+btn.dataset.cols,+btn.dataset.mines);
}));

$('#faceBtn').addEventListener('click',()=>{
  const activeBtn=$('.diff-btn.active');
  init(+activeBtn.dataset.rows,+activeBtn.dataset.cols,+activeBtn.dataset.mines);
});

window.addEventListener('resize',scaleGrid);

init();
})();
</script>
</body>
</html>
