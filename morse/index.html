            '+': 'В·вҖ”В·вҖ”В·', '-': 'вҖ”В·В·В·В·вҖ”', '_': 'В·В·вҖ”вҖ”В·вҖ”', '"': 'В·вҖ”В·В·вҖ”В·',

        };

        const textToMorseBtn = document.getElementById('textToMorseBtn');

        const convertBtn = document.getElementById('convertBtn');
        const outputArea = document.getElementById('outputArea');
        const outputText = document.getElementById('outputText');
        const copyBtn = document.getElementById('copyBtn');
        const visualMorse = document.getElementById('visualMorse');
        const visualContent = document.getElementById('visualContent');
        const audioControls = document.getElementById('audioControls');
        const playBtn = document.getElementById('playBtn');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');

        let currentMode = 'textToMorse';
        let currentMorse = '';
        let audioContext = null;

        textToMorseBtn.addEventListener('click', function() {

        });

        convertBtn.addEventListener('click', function() {

            if (!input) {
                showToast('иҜ·иҫ“е…ҘеҶ…е®№пјҒ');

            if (currentMode === 'textToMorse') {

        function convertTextToMorse(text) {
            const upperText = text.toUpperCase();
            const words = upperText.split(' ');
            const morseWords = [];

            for (let word of words) {
                const morseChars = [];
                for (let char of word) {
                    if (morseCode[char]) {
                        morseChars.push(morseCode[char]);
                    } else {
                        morseChars.push('?');
                    }
                }
                morseWords.push(morseChars.join(' '));
            }

            currentMorse = morseWords.join(' / ');
            outputText.textContent = currentMorse;
            outputArea.style.display = 'block';
            visualMorse.style.display = 'block';
            audioControls.style.display = 'flex';

            displayVisualMorse(currentMorse);
        }

        function convertMorseToText(morse) {
            const words = morse.split(' / ');
            const textWords = [];

            for (let word of words) {
                const chars = word.trim().split(' ');
                let textWord = '';

                for (let char of chars) {
                    const found = Object.keys(morseCode).find(key => morseCode[key] === char);
                    textWord += found || '?';
                }

                textWords.push(textWord);
            }

            const result = textWords.join(' ');
            outputText.textContent = result;
            outputArea.style.display = 'block';
            visualMorse.style.display = 'none';
            audioControls.style.display = 'none';
        }

        function displayVisualMorse(morse) {
            visualContent.innerHTML = '';

            for (let char of morse) {
                if (char === 'В·') {
                    const dot = document.createElement('span');
                    dot.className = 'dot';
                    visualContent.appendChild(dot);
                } else if (char === 'вҖ”') {
                    const dash = document.createElement('span');
                    dash.className = 'dash';
                    visualContent.appendChild(dash);
                } else if (char === ' ') {
                    const space = document.createElement('span');
                    space.className = 'space';
                    visualContent.appendChild(space);
                } else if (char === '/') {
                    const wordSpace = document.createElement('span');
                    wordSpace.className = 'word-space';
                    visualContent.appendChild(wordSpace);
                }
            }
        }

        function playMorseAudio() {
            if (!currentMorse) return;

            isPlaying = true;
            playBtn.textContent = 'вҸ№ еҒңжӯў';
            playBtn.classList.add('playing');

            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const speed = parseInt(speedSlider.value);
            const dotDuration = 0.15 / (speed / 5);

            const morseChars = currentMorse.split('');
            let time = audioContext.currentTime;

            for (let char of morseChars) {
                if (char === 'В·') {
                    playBeep(time, dotDuration);
                    time += dotDuration * 2;
                } else if (char === 'вҖ”') {
                    playBeep(time, dotDuration * 3);
                    time += dotDuration * 4;
                } else if (char === ' ') {
                    time += dotDuration * 3;
                } else if (char === '/') {
                    time += dotDuration * 7;
                }
            }

            const totalDuration = time - audioContext.currentTime;
            setTimeout(() => {
                stopAudio();
            }, totalDuration * 1000);
        }

        function playBeep(startTime, duration) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 600;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.5, startTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + duration);

            oscillator.start(startTime);
            oscillator.stop(startTime + duration);
        }

        function stopAudio() {
            isPlaying = false;
            playBtn.textContent = 'в–¶ ж’ӯж”ҫ';
            playBtn.classList.remove('playing');

            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('е·ІеӨҚеҲ¶еҲ°еүӘиҙҙжқҝпјҒ');
                });
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('е·ІеӨҚеҲ¶еҲ°еүӘиҙҙжқҝпјҒ');
            }
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        function initReferenceTable() {
            for (let char in morseCode) {
                const item = document.createElement('div');
                item.className = 'ref-item';
                item.innerHTML = `
                    <div class="ref-char">${char}</div>
                    <div class="ref-code">${morseCode[char]}</div>
                `;
                refGrid.appendChild(item);
            }
        }

        initReferenceTable();
    </script>
</body>
</html>
