<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>屏幕画板 - 工具箱 Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f2f5;--card:rgba(255,255,255,0.85);--text:#1a1a2e;--muted:#a0aec0;--accent:#6366f1;--accent-hover:#4f46e5;--border:rgba(0,0,0,0.06);--shadow:0 4px 16px rgba(0,0,0,0.08)}
[data-theme="dark"]{--bg:#0f0f1a;--card:rgba(30,30,50,0.85);--text:#e2e8f0;--muted:#718096;--accent:#818cf8;--border:rgba(255,255,255,0.06);--shadow:0 4px 16px rgba(0,0,0,0.3)}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; overflow: hidden; }
.back-btn { position: fixed; top: 12px; left: 12px; z-index: 100; display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; background: var(--card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 10px; color: var(--text); text-decoration: none; font-size: 13px; font-weight: 500; transition: all 0.2s; box-shadow: var(--shadow); }
.back-btn:hover { transform: translateX(-3px); }
/* 画布区域 */
.canvas-wrapper { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 56px 16px 16px; }
canvas { background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); cursor: crosshair; touch-action: none; max-width: 100%; max-height: 100%; }
[data-theme="dark"] canvas { background: #1a1a2e; }
/* 工具栏 */
.toolbar { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 6px; padding: 8px 14px; background: var(--card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); }
.tool-group { display: flex; gap: 4px; align-items: center; padding: 0 6px; border-right: 1px solid var(--border); }
.tool-group:last-child { border-right: none; }
.tool-btn { width: 36px; height: 36px; border-radius: 8px; border: none; background: transparent; color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.tool-btn:hover { background: rgba(99,102,241,0.1); }
.tool-btn.active { background: var(--accent); color: white; }
/* 颜色选择 */
.color-picker { display: flex; gap: 4px; align-items: center; }
.color-btn { width: 24px; height: 24px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: all 0.15s; }
.color-btn:hover { transform: scale(1.15); }
.color-btn.active { border-color: var(--text); box-shadow: 0 0 0 2px var(--accent); }
/* 画笔大小 */
.size-slider { width: 80px; accent-color: var(--accent); }
.size-label { font-size: 11px; color: var(--muted); min-width: 28px; text-align: center; }
/* 右侧工具面板 */
.side-panel { position: fixed; right: 12px; top: 50%; transform: translateY(-50%); z-index: 100; display: flex; flex-direction: column; gap: 8px; padding: 12px; background: var(--card); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); }
.panel-btn { width: 40px; height: 40px; border-radius: 10px; border: none; background: transparent; color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.panel-btn:hover { background: rgba(99,102,241,0.1); }
.panel-btn.active { background: var(--accent); color: white; }
/* 底部信息 */
.bottom-bar { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 8px; padding: 8px 16px; background: var(--card); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); font-size: 12px; color: var(--muted); align-items: center; }
/* 预览圆点 */
.brush-preview { position: fixed; pointer-events: none; z-index: 99; border-radius: 50%; border: 1px solid rgba(0,0,0,0.3); transform: translate(-50%, -50%); display: none; }
/* 保存弹窗 */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; }
.overlay.show { display: flex; }
.modal { background: var(--card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 32px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: modalIn 0.3s ease; }
@keyframes modalIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal h3 { font-size: 18px; margin-bottom: 16px; }
.modal .btn { padding: 10px 24px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.modal input { width: 100%; padding: 10px 14px; border-radius: 10px; border: 2px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; outline: none; margin-bottom: 16px; font-family: inherit; }
.modal input:focus { border-color: var(--accent); }
/*  eraser cursor */
.eraser-cursor { cursor: cell; }
</style>

<script>(function(){var s=localStorage.getItem('theme');if(s==='light'||s==='dark'){document.documentElement.setAttribute('data-theme',s)}else{var d=window.matchMedia('(prefers-color-scheme:dark)').matches;document.documentElement.setAttribute('data-theme',d?'dark':'light')}})();</script>

<a href="/" class="back-btn">← 返回</a>


<div class="toolbar">
  <div class="tool-group">
    <button class="tool-btn active" id="toolPen" onclick="setTool('pen')" title="画笔">✏️</button>
    <button class="tool-btn" id="toolEraser" onclick="setTool('eraser')" title="橡皮擦">🧹</button>
  </div>
  <div class="tool-group">
    <div class="color-picker" id="colorPicker"></div>
  </div>
  <div class="tool-group">
    <span class="size-label" id="sizeLabel">3</span>
    <input class="size-slider" type="range" id="sizeSlider" min="1" max="30" value="3" oninput="updateSize()">
  </div>
  <div class="tool-group">
    <button class="tool-btn" onclick="undo()" title="撤销">↩️</button>
    <button class="tool-btn" onclick="redo()" title="重做">↪️</button>
  </div>
</div>


<div class="canvas-wrapper">
  <canvas id="drawCanvas"></canvas>
</div>


<div class="side-panel">
  <button class="panel-btn" onclick="clearCanvas()" title="清空">🗑️</button>
  <button class="panel-btn" onclick="saveImage()" title="保存">💾</button>
  <button class="panel-btn" onclick="toggleFullscreen()" title="全屏">⛶</button>
</div>


<div class="bottom-bar">
  <span id="coordInfo">X: 0, Y: 0</span>
  <span>|</span>
  <span id="zoomInfo">100%</span>
</div>


<div class="brush-preview" id="brushPreview"></div>


<div class="overlay" id="saveOverlay">
  <div class="modal">
    <h3>保存图片</h3>
    <input type="text" id="fileName" placeholder="文件名" value="我的画作">
    <div style="display:flex;gap:12px;justify-content:center;">
      <button class="btn" onclick="downloadImage()">保存为 PNG</button>
      <button class="btn" style="background:var(--muted);" onclick="closeSave()">取消</button>
    </div>
  </div>
</div>

<script>
// 初始化画布
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');
let isDrawing = false;
let lastX = 0, lastY = 0;
let currentTool = 'pen'; // 'pen' or 'eraser'
let currentColor = '#1a1a2e';
let brushSize = 3;
let undoStack = [];
let redoStack = [];
const MAX_UNDO = 30;

// 调整画布大小
function resizeCanvas() {
  const wrapper = document.querySelector('.canvas-wrapper');
  const maxW = wrapper.clientWidth - 32;
  const maxH = wrapper.clientHeight - 32;
  const ratio = 16 / 10;
  let w = maxW;
  let h = w / ratio;
  if (h > maxH) { h = maxH; w = h * ratio; }
  canvas.width = w;
  canvas.height = h;
  // 设置绘图样式
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  // 填充白色背景（亮色模式）
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  ctx.fillStyle = isDark ? '#1a1a2e' : '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  saveState();
}

// 保存状态（撤销用）
function saveState() {
  if (undoStack.length >= MAX_UNDO) undoStack.shift();
  undoStack.push(canvas.toDataURL());
  redoStack = [];
}

// 撤销
function undo() {
  if (undoStack.length <= 1) return;
  redoStack.push(undoStack.pop());
  const img = new Image();
  img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); };
  img.src = undoStack[undoStack.length - 1];
}

// 重做
function redo() {
  if (redoStack.length === 0) return;
  const state = redoStack.pop();
  undoStack.push(state);
  const img = new Image();
  img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); };
  img.src = state;
}

// 设置工具
function setTool(tool) {
  currentTool = tool;
  document.getElementById('toolPen').classList.toggle('active', tool === 'pen');
  document.getElementById('toolEraser').classList.toggle('active', tool === 'eraser');
  canvas.className = tool === 'eraser' ? 'eraser-cursor' : '';
}

// 初始化颜色选择
function initColors() {
  const colors = ['#1a1a2e', '#ef4444', '#f59e0b', '#22c55e', '#3b82f6', '#8b5cf6', '#ec4899', '#ffffff'];
  const picker = document.getElementById('colorPicker');
  colors.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'color-btn' + (c === currentColor ? ' active' : '');
    btn.style.background = c;
    if (c === '#ffffff') btn.style.border = '2px solid #ccc';
    btn.onclick = () => {
      currentColor = c;
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      setTool('pen');
    };
    picker.appendChild(btn);
  });
  // 自定义颜色
  const custom = document.createElement('input');
  custom.type = 'color';
  custom.value = '#6366f1';
  custom.style.cssText = 'width:24px;height:24px;border:none;padding:0;cursor:pointer;background:none;border-radius:50%;overflow:hidden;';
  custom.oninput = () => {
    currentColor = custom.value;
    setTool('pen');
  };
  picker.appendChild(custom);
}

// 更新画笔大小
function updateSize() {
  brushSize = parseInt(document.getElementById('sizeSlider').value);
  document.getElementById('sizeLabel').textContent = brushSize;
}

// 绘图事件
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return {
    x: (touch.clientX - rect.left) * (canvas.width / rect.width),
    y: (touch.clientY - rect.top) * (canvas.height / rect.height)
  };
}

canvas.addEventListener('mousedown', (e) => {
  isDrawing = true;
  const pos = getPos(e);
  lastX = pos.x; lastY = pos.y;
  // 画一个点
  ctx.beginPath();
  ctx.arc(lastX, lastY, brushSize / 2, 0, Math.PI * 2);
  ctx.fillStyle = currentTool === 'eraser' ? (document.documentElement.getAttribute('data-theme') === 'dark' ? '#1a1a2e' : '#ffffff') : currentColor;
  ctx.fill();
});

canvas.addEventListener('mousemove', (e) => {
  const pos = getPos(e);
  document.getElementById('coordInfo').textContent = `X: ${Math.round(pos.x)}, Y: ${Math.round(pos.y)}`;
  if (!isDrawing) {
    // 显示画笔预览
    const preview = document.getElementById('brushPreview');
    preview.style.display = 'block';
    preview.style.left = e.clientX + 'px';
    preview.style.top = e.clientY + 'px';
    preview.style.width = brushSize * (canvas.width / canvas.getBoundingClientRect().width) + 'px';
    preview.style.height = preview.style.width;
    return;
  }
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(pos.x, pos.y);
  if (currentTool === 'eraser') {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    ctx.strokeStyle = isDark ? '#1a1a2e' : '#ffffff';
    ctx.lineWidth = brushSize * 2;
  } else {
    ctx.strokeStyle = currentColor;
    ctx.lineWidth = brushSize;
  }
  ctx.stroke();
  lastX = pos.x; lastY = pos.y;
});

canvas.addEventListener('mouseup', () => { if (isDrawing) { isDrawing = false; saveState(); } });
canvas.addEventListener('mouseleave', () => { isDrawing = false; document.getElementById('brushPreview').style.display = 'none'; });

// 触摸支持
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; const pos = getPos(e); lastX = pos.x; lastY = pos.y; });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (!isDrawing) return; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(pos.x, pos.y); ctx.strokeStyle = currentTool === 'eraser' ? '#ffffff' : currentColor; ctx.lineWidth = currentTool === 'eraser' ? brushSize * 2 : brushSize; ctx.stroke(); lastX = pos.x; lastY = pos.y; });
canvas.addEventListener('touchend', () => { isDrawing = false; saveState(); });

// 清空画布
function clearCanvas() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  ctx.fillStyle = isDark ? '#1a1a2e' : '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  saveState();
}

// 保存图片
function saveImage() {
  document.getElementById('saveOverlay').classList.add('show');
}

function closeSave() {
  document.getElementById('saveOverlay').classList.remove('show');
}

function downloadImage() {
  const name = document.getElementById('fileName').value || '我的画作';
  const link = document.createElement('a');
  link.download = name + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  closeSave();
}

// 全屏
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}

// 初始化
window.addEventListener('DOMContentLoaded', () => {
  resizeCanvas();
  initColors();
  updateSize();
});

window.addEventListener('resize', () => {
  // 保存当前内容
  const data = canvas.toDataURL();
  resizeCanvas();
  const img = new Image();
  img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  img.src = data;
});
</script>
</body>
</html>
