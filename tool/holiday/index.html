<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>节假日倒计时 - 工具箱 Pro</title>
<style>
:root{
  --bg:#0f1020; --card:#1a1b2e; --text:#fff; --muted:#888; --accent:#6366f1; --accent2:#818cf8;
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;
  background:radial-gradient(circle at 50% 0%,#1c1d3a,#0f1020);color:var(--text);
  min-height:100vh;padding:calc(20px + var(--safe-top)) 16px calc(20px + var(--safe-bottom));
}
.back{position:fixed;top:calc(12px + var(--safe-top));left:12px;z-index:50;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:var(--text);text-decoration:none;padding:8px 14px;border-radius:10px;font-size:14px;backdrop-filter:blur(8px);}
h1{text-align:center;font-size:20px;font-weight:600;margin:10px 0 6px;}
.sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:22px;}
.hero{background:linear-gradient(135deg,#2a2b50,#1a1b2e);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:24px;margin-bottom:22px;text-align:center;}
.hero .label{color:var(--accent2);font-size:14px;margin-bottom:10px;}
.hero .name{font-size:30px;font-weight:700;margin-bottom:14px;}
.hero .cd{font-size:46px;font-weight:800;letter-spacing:1px;}
.hero .cd small{font-size:18px;font-weight:500;color:var(--muted);}
.hero .date{color:var(--muted);font-size:13px;margin-top:10px;}
.list{display:flex;flex-direction:column;gap:10px;}
.row{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.row .emoji{font-size:24px;}
.row .info{flex:1;}
.row .info .n{font-size:15px;font-weight:600;}
.row .info .d{font-size:12px;color:var(--muted);}
.row .left{font-size:14px;font-weight:600;color:var(--accent2);white-space:nowrap;}
@media (max-width:360px){
  .back{top:calc(6px + var(--safe-top));left:6px;padding:6px 10px;font-size:12px;}
  h1{font-size:17px;}
  .hero{padding:18px;margin-bottom:16px;border-radius:14px;}
  .hero .name{font-size:24px;}
  .hero .cd{font-size:36px;}
  .row{padding:11px 12px;gap:8px;}
  .row .emoji{font-size:20px;}
  .row .info .n{font-size:13px;}
}
@media (shape:round){
  .hero .cd{font-size:9vmin;}
}
</style>
</head>
<body>
<a href="javascript:history.back()" class="back">← 返回</a>
<h1>📅 节假日倒计时</h1>
<div class="sub">距离下一个法定节假日还有</div>
<div class="hero">
  <div class="label">下一个假期</div>
  <div class="name" id="heroName">—</div>
  <div class="cd" id="heroCd">—</div>
  <div class="date" id="heroDate"></div>
</div>
<div class="list" id="list"></div>

<script>
// 2026 年中国法定节假日（日期为当地时区）
var holidays=[
  {n:"元旦",e:"🎉",d:"2026-01-01"},
  {n:"春节",e:"🧧",d:"2026-02-17"},
  {n:"清明节",e:"🌿",d:"2026-04-05"},
  {n:"劳动节",e:"💼",d:"2026-05-01"},
  {n:"端午节",e:"🐉",d:"2026-06-19"},
  {n:"中秋节",e:"🌕",d:"2026-09-25"},
  {n:"国庆节",e:"🇨🇳",d:"2026-10-01"}
];
function parse(d){var p=d.split('-');return new Date(p[0],p[1]-1,p[2],0,0,0,0);}
function fmt(ms){
  if(ms<=0)return {t:"0",u:"天",done:true};
  var s=Math.floor(ms/1000),day=Math.floor(s/86400),hr=Math.floor(s%86400/3600),mi=Math.floor(s%3600/60);
  if(day>0)return {t:day,u:"天"};
  if(hr>0)return {t:hr,u:"时"};
  return {t:mi,u:"分"};
}
function tick(){
  var now=new Date();
  var next=null;
  for(var i=0;i<holidays.length;i++){if(parse(holidays[i].d)>now){next=holidays[i];break;}}
  if(!next){
    // 元旦跨年兜底
    next={n:"元旦",e:"🎉",d:"2027-01-01"};
  }
  var diff=parse(next.d)-now;
  var f=fmt(diff);
  document.getElementById('heroName').textContent=next.e+' '+next.n;
  document.getElementById('heroCd').innerHTML=(f.done?'已到':f.t)+' <small>'+(f.done?'':f.u)+'</small>';
  document.getElementById('heroDate').textContent='日期：'+next.d;
  var list=document.getElementById('list');list.innerHTML='';
  for(var i=0;i<holidays.length;i++){
    var h=holidays[i],dd=parse(h.d)-now,ff=fmt(dd);
    var row=document.createElement('div');row.className='row';
    row.innerHTML='<div class="emoji">'+h.e+'</div><div class="info"><div class="n">'+h.n+'</div><div class="d">'+h.d+'</div></div><div class="left">'+(dd<=0?'已过':ff.t+ff.u)+'</div>';
    list.appendChild(row);
  }
}
tick();setInterval(tick,30000);
</script>
</body>
</html>
