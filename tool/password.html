<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随机密码生成器 - 工具箱 Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f2f5;--card:rgba(255,255,255,0.85);--text:#1a1a2e;--muted:#a0aec0;--accent:#6366f1;--accent-hover:#4f46e5;--border:rgba(0,0,0,0.06);--shadow:0 4px 16px rgba(0,0,0,0.08)}
[data-theme="dark"]{--bg:#0f0f1a;--card:rgba(30,30,50,0.85);--text:#e2e8f0;--muted:#718096;--accent:#818cf8;--border:rgba(255,255,255,0.06);--shadow:0 4px 16px rgba(0,0,0,0.3)}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
  transition: background 0.3s, color 0.3s;
}
/* 返回按钮 */
.back-btn {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 100;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: var(--card);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  box-shadow: var(--shadow);
  transition: all 0.2s;
}
.back-btn:hover { background: var(--accent); color: #fff; }
/* 主卡片 */
.card {
  background: var(--card);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px;
  box-shadow: var(--shadow);
  max-width: 520px;
  width: 100%;
  transition: all 0.3s;
  margin-bottom: 20px;
}
h1 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 28px;
  letter-spacing: -0.5px;
  text-align: center;
}
/* 密码显示区域 */
.password-output {
  position: relative;
  margin-bottom: 24px;
}
.password-output input {
  width: 100%;
  padding: 14px 50px 14px 16px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--bg);
  color: var(--text);
  font-size: 18px;
  font-family: 'Courier New', monospace;
  font-weight: 600;
  letter-spacing: 1px;
  outline: none;
  transition: border 0.2s;
}
.password-output input:focus {
  border-color: var(--accent);
}
/* 复制按钮 */
.copy-btn {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}
.copy-btn:hover { background: var(--accent-hover); }
/* 长度滑块 */
.length-section {
  margin-bottom: 22px;
}
.length-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.length-header label {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
}
.length-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  min-width: 40px;
  text-align: right;
}
/* 自定义滑块样式 */
input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 6px;
  border-radius: 3px;
  background: var(--border);
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(99,102,241,0.4);
}
input[type="range"]::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: none;
}
/* 密码强度条 */
.strength-section {
  margin-bottom: 22px;
}
.strength-bar-bg {
  width: 100%;
  height: 6px;
  border-radius: 3px;
  background: var(--border);
  overflow: hidden;
  margin-bottom: 6px;
}
.strength-bar-fill {
  height: 100%;
  width: 0%;
  border-radius: 3px;
  transition: all 0.3s;
}
.strength-label {
  font-size: 13px;
  font-weight: 500;
}
/* 强度颜色 */
.strength-weak .strength-bar-fill { width: 25%; background: #ef4444; }
.strength-weak .strength-label { color: #ef4444; }
.strength-medium .strength-bar-fill { width: 50%; background: #f59e0b; }
.strength-medium .strength-label { color: #f59e0b; }
.strength-strong .strength-bar-fill { width: 75%; background: #10b981; }
.strength-strong .strength-label { color: #10b981; }
.strength-very-strong .strength-bar-fill { width: 100%; background: #6366f1; }
.strength-very-strong .strength-label { color: #6366f1; }
/* 字符类型勾选 */
.options-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 24px;
}
.option-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.option-item:hover {
  border-color: var(--accent);
}
.option-item input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
  cursor: pointer;
}
.option-item span {
  font-size: 14px;
  font-weight: 500;
}
/* 生成按钮 */
.generate-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: var(--accent);
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
  margin-bottom: 16px;
}
.generate-btn:hover { background: var(--accent-hover); }
/* 批量密码区域 */
.batch-section {
  margin-top: 20px;
}
.batch-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.batch-header h3 {
  font-size: 15px;
  font-weight: 600;
}
.batch-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  color: var(--text);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}
.batch-btn:hover {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.batch-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.batch-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
}
.batch-item code {
  font-family: 'Courier New', monospace;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.5px;
  word-break: break-all;
}
.batch-item .copy-btn {
  position: static;
  transform: none;
  padding: 4px 10px;
  font-size: 12px;
  flex-shrink: 0;
  margin-left: 10px;
}
/* Toast 提示 */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: 12px 24px;
  background: var(--text);
  color: var(--bg);
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  transition: transform 0.3s ease;
  z-index: 9999;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
}
/* 响应式 */
@media (max-width: 600px) {
  .card { padding: 24px; }
  .options-section { grid-template-columns: 1fr; }
}
</style>
</head>
<body>


<script>
(function(){var s=localStorage.getItem('theme');if(s==='light'||s==='dark'){document.documentElement.setAttribute('data-theme',s)}else{var d=window.matchMedia('(prefers-color-scheme:dark)').matches;document.documentElement.setAttribute('data-theme',d?'dark':'light')}})();

<div class="card">
  <h1>🔐 随机密码生成器</h1>

  
  <div class="password-output">
    <input type="text" id="passwordOutput" readonly placeholder="点击生成密码">
    <button class="copy-btn" onclick="copyPassword()">复制</button>
  </div>

  
  <div class="length-section">
    <div class="length-header">
      <label>密码长度</label>
      <span class="length-value" id="lengthValue">16</span>
    </div>
    <input type="range" id="lengthSlider" min="8" max="64" value="16" oninput="updateLength()">
  </div>

  
  <div class="strength-section" id="strengthSection">
    <div class="strength-bar-bg">
      <div class="strength-bar-fill"></div>
    </div>
    <span class="strength-label" id="strengthLabel">—</span>
  </div>

  
  <div class="options-section">
    <label class="option-item">
      <input type="checkbox" id="optLower" checked>
      <span>小写字母 (a-z)</span>
    </label>
    <label class="option-item">
      <input type="checkbox" id="optUpper" checked>
      <span>大写字母 (A-Z)</span>
    </label>
    <label class="option-item">
      <input type="checkbox" id="optNum" checked>
      <span>数字 (0-9)</span>
    </label>
    <label class="option-item">
      <input type="checkbox" id="optSymbol" checked>
      <span>特殊符号 (!@#)</span>
    </label>
  </div>

  
  <button class="generate-btn" onclick="generatePassword()">生成密码</button>

  
  <div class="batch-section">
    <div class="batch-header">
      <h3>批量生成</h3>
      <button class="batch-btn" onclick="batchGenerate()">生成 5 个</button>
    </div>
    <div class="batch-list" id="batchList"></div>
  </div>
</div>


<div class="toast" id="toast">已复制</div>

<script>
// 字符集定义
const CHAR_SETS = {
  lower: 'abcdefghijklmnopqrstuvwxyz',
  upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  numbers: '0123456789',
  symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
};

// 更新长度显示
function updateLength() {
  const val = document.getElementById('lengthSlider').value;
  document.getElementById('lengthValue').textContent = val;
}

// 获取选中的字符集
function getCharset() {
  let charset = '';
  if (document.getElementById('optLower').checked) charset += CHAR_SETS.lower;
  if (document.getElementById('optUpper').checked) charset += CHAR_SETS.upper;
  if (document.getElementById('optNum').checked) charset += CHAR_SETS.numbers;
  if (document.getElementById('optSymbol').checked) charset += CHAR_SETS.symbols;
  return charset;
}

// 生成单个密码
function generatePassword() {
  const charset = getCharset();
  if (!charset) {
    document.getElementById('passwordOutput').value = '请至少选择一种字符类型';
    return '';
  }
  const length = parseInt(document.getElementById('lengthSlider').value);
  let password = '';
  const array = new Uint32Array(length);
  crypto.getRandomValues(array);
  for (let i = 0; i < length; i++) {
    password += charset[array[i] % charset.length];
  }
  document.getElementById('passwordOutput').value = password;
  updateStrength(password);
  return password;
}

// 更新密码强度显示
function updateStrength(password) {
  const section = document.getElementById('strengthSection');
  const label = document.getElementById('strengthLabel');
  // 移除所有强度类
  section.className = 'strength-section';

  if (!password) {
    label.textContent = '—';
    return;
  }

  let score = 0;
  // 长度评分
  if (password.length >= 8) score++;
  if (password.length >= 12) score++;
  if (password.length >= 16) score++;
  // 字符种类评分
  if (/[a-z]/.test(password)) score++;
  if (/[A-Z]/.test(password)) score++;
  if (/[0-9]/.test(password)) score++;
  if (/[^a-zA-Z0-9]/.test(password)) score++;

  let strength, className;
  if (score <= 2) { strength = '弱'; className = 'strength-weak'; }
  else if (score <= 3) { strength = '中'; className = 'strength-medium'; }
  else if (score <= 5) { strength = '强'; className = 'strength-strong'; }
  else { strength = '极强'; className = 'strength-very-strong'; }

  section.classList.add(className);
  label.textContent = strength;
}

// 复制到剪贴板（带 fallback）
function clipboardWrite(text, callback) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(callback).catch(() => { fallbackCopy(text); callback(); });
  } else {
    fallbackCopy(text); callback();
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

// 复制密码到剪贴板
function copyPassword() {
  const pwd = document.getElementById('passwordOutput').value;
  if (!pwd || pwd === '请至少选择一种字符类型') return;
  clipboardWrite(pwd, () => showToast('已复制'));
}

// 批量生成5个密码
function batchGenerate() {
  const charset = getCharset();
  if (!charset) return;
  const length = parseInt(document.getElementById('lengthSlider').value);
  const list = document.getElementById('batchList');
  list.innerHTML = '';

  for (let i = 0; i < 5; i++) {
    let password = '';
    const array = new Uint32Array(length);
    crypto.getRandomValues(array);
    for (let j = 0; j < length; j++) {
      password += charset[array[j] % charset.length];
    }
    const item = document.createElement('div');
    item.className = 'batch-item';
    item.innerHTML = '<code>' + password + '</code><button class="copy-btn" onclick="copyText(\'' + password.replace(/'/g, "\\'") + '\')">复制</button>';
    list.appendChild(item);
  }
}

// 复制指定文本
function copyText(text) {
  clipboardWrite(text, () => showToast('已复制'));
}

// 显示 Toast 提示
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// 字符选项变化时重新评估强度
document.getElementById('optLower').addEventListener('change', () => {
  const pwd = document.getElementById('passwordOutput').value;
  if (pwd) updateStrength(generatePassword());
});
document.getElementById('optUpper').addEventListener('change', () => {
  const pwd = document.getElementById('passwordOutput').value;
  if (pwd) updateStrength(generatePassword());
});
document.getElementById('optNum').addEventListener('change', () => {
  const pwd = document.getElementById('passwordOutput').value;
  if (pwd) updateStrength(generatePassword());
});
document.getElementById('optSymbol').addEventListener('change', () => {
  const pwd = document.getElementById('passwordOutput').value;
  if (pwd) updateStrength(generatePassword());
});

// 页面加载时生成一个默认密码
window.addEventListener('DOMContentLoaded', () => {
  generatePassword();
});
</script>
</body>
