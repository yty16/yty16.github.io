<meta charset="UTF-8">

<title>井字棋人机对战 - 工具箱 Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f2f5;--card:rgba(255,255,255,0.85);--text:#1a1a2e;--muted:#a0aec0;--accent:#6366f1;--accent-hover:#4f46e5;--border:rgba(0,0,0,0.06);--shadow:0 4px 16px rgba(0,0,0,0.08)}
[data-theme="dark"]{--bg:#0f0f1a;--card:rgba(30,30,50,0.85);--text:#e2e8f0;--muted:#718096;--accent:#818cf8;--border:rgba(255,255,255,0.06);--shadow:0 4px 16px rgba(0,0,0,0.3)}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; }
.back-btn { position: fixed; top: 20px; left: 20px; z-index: 100; display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 10px; color: var(--text); text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.2s; box-shadow: var(--shadow); }
.back-btn:hover { transform: translateX(-3px); }
.container { max-width: 500px; margin: 0 auto; padding: 80px 20px 40px; display: flex; flex-direction: column; align-items: center; }
h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; text-align: center; }
.subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; text-align: center; }
.card { background: var(--card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 100%; box-shadow: var(--shadow); margin-bottom: 20px; }

/* 设置栏 */
.settings-row{display:flex;gap:14px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
.setting-group{display:flex;flex-direction:column;align-items:center;gap:6px}
.setting-label{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:0.5px}
.btn-group-sm{display:flex;gap:4px}
.btn-sm{padding:6px 14px;border:2px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.size-btn{padding:6px 10px;font-size:12px}

/* 状态信息 */
.status { text-align: center; font-size: 18px; font-weight: 600; min-height: 36px; margin-bottom: 20px; transition: all 0.3s; }
.status.thinking { color: var(--muted); }
.status.your-turn { color: var(--accent); }
.status.win { color: #22c55e; }
.status.lose { color: #ef4444; }
.status.draw { color: var(--muted); }

/* 棋盘 */
.board { display: grid; gap: 7px; margin-bottom: 24px; justify-content: center; }
.board.size-3 { grid-template-columns: repeat(3, 90px); grid-template-rows: repeat(3, 90px); }
.board.size-4 { grid-template-columns: repeat(4, 68px); grid-template-rows: repeat(4, 68px); }
.board.size-5 { grid-template-columns: repeat(5, 56px); grid-template-rows: repeat(5, 56px); }
.cell { background: var(--bg); border-radius: 14px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 700; cursor: pointer; transition: all 0.2s; user-select: none; position: relative; overflow: hidden; }
.board.size-3 .cell { font-size: 36px; }
.board.size-4 .cell { font-size: 26px; }
.board.size-5 .cell { font-size: 20px; }
.cell:hover:not(.taken) { border-color: var(--accent); background: rgba(99,102,241,0.05); transform: scale(1.04); }
.cell.taken { cursor: default; }
.cell .piece { animation: pieceIn 0.3s ease; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
.cell .piece.x-piece { color: var(--accent); }
.cell .piece.o-piece { color: #f59e0b; }
@keyframes pieceIn { from { opacity: 0; transform: scale(0.3) rotate(-20deg); } to { opacity: 1; transform: scale(1) rotate(0); } }
.cell.win-cell { animation: winPulse 0.6s ease infinite alternate; border-color: #22c55e; background: rgba(34,197,94,0.08); }
@keyframes winPulse { from { transform: scale(1); } to { transform: scale(1.04); } }

/* 战绩统计 */
.record-bar { display: flex; gap: 12px; margin-bottom: 20px; justify-content: center; }
.record-item { background: var(--bg); border-radius: 12px; padding: 14px 20px; text-align: center; min-width: 80px; border: 1px solid var(--border); }
.record-num { font-size: 24px; font-weight: 700; }
.record-num.win-num { color: #22c55e; }
.record-num.lose-num { color: #ef4444; }
.record-num.draw-num { color: var(--muted); }
.record-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* 按钮 */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 28px; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
.btn-group { display: flex; gap: 12px; justify-content: center; }

/* 结果弹窗 */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; }
.overlay.show { display: flex; }
.modal { background: var(--card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 40px; max-width: 340px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: modalIn 0.3s ease; }
@keyframes modalIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal .result-icon { font-size: 56px; margin-bottom: 12px; display: block; }
.modal h2 { font-size: 22px; margin-bottom: 8px; }
.modal p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
.modal .btn { width: 100%; }

@media(max-width:480px){
  .container{padding:70px 12px 30px}
  .card{padding:16px}
  h1{font-size:24px}
  .board.size-3{grid-template-columns:repeat(3,80px);grid-template-rows:repeat(3,80px)}
  .board.size-4{grid-template-columns:repeat(4,60px);grid-template-rows:repeat(4,60px)}
  .board.size-5{grid-template-columns:repeat(5,48px);grid-template-rows:repeat(5,48px)}
}
</style>

<script>(function(){var s=localStorage.getItem('theme');if(s==='light'||s==='dark'){document.documentElement.setAttribute('data-theme',s)}else{var d=window.matchMedia('(prefers-color-scheme:dark)').matches;document.documentElement.setAttribute('data-theme',d?'dark':'light')}})();</script>

<div class="container">
  <h1>🎮 井字棋人机对战</h1>
  <p class="subtitle">支持 3×3 / 4×4 / 5×5 棋盘，挑战电脑</p>

  <div class="card">
    <!-- 设置栏 -->
    <div class="settings-row">
      <div class="setting-group">
        <span class="setting-label">先手</span>
        <div class="btn-group-sm">
          <button class="btn-sm active" id="orderFirst" onclick="setOrder(true)">玩家先</button>
          <button class="btn-sm" id="orderSecond" onclick="setOrder(false)">电脑先</button>
        </div>
      </div>
      <div class="setting-group">
        <span class="setting-label">棋盘</span>
        <div class="btn-group-sm">
          <button class="btn-sm size-btn active" id="tSize3" onclick="setTSize(3)">3×3</button>
          <button class="btn-sm size-btn" id="tSize4" onclick="setTSize(4)">4×4</button>
          <button class="btn-sm size-btn" id="tSize5" onclick="setTSize(5)">5×5</button>
        </div>
      </div>
    </div>

    <div class="status your-turn" id="status">你的回合 (X)</div>

    <div class="board size-3" id="board"></div>

    <div class="record-bar">
      <div class="record-item">
        <div class="record-num win-num" id="recWin">0</div>
        <div class="record-label">胜</div>
      </div>
      <div class="record-item">
        <div class="record-num draw-num" id="recDraw">0</div>
        <div class="record-label">平</div>
      </div>
      <div class="record-item">
        <div class="record-num lose-num" id="recLose">0</div>
        <div class="record-label">负</div>
      </div>
    </div>

    <div class="btn-group">
      <button class="btn" onclick="restartGame()">重新开始</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <span class="result-icon" id="resIcon">🏆</span>
    <h2 id="resTitle">你赢了！</h2>
    <p id="resDesc">太厉害了，击败了电脑！</p>
    <button class="btn" onclick="closeModal()">再来一局</button>
  </div>
</div>

<script>
// 游戏状态
let boardSize = 3;
let board = [];
let playerIsX = true;
let currentPlayer = 'X';
let gameOver = false;
let computerThinking = false;

// 读取战绩
function loadRecord() {
  const r = JSON.parse(localStorage.getItem('tttRecord') || '{"w":0,"d":0,"l":0}');
  document.getElementById('recWin').textContent = r.w;
  document.getElementById('recDraw').textContent = r.d;
  document.getElementById('recLose').textContent = r.l;
  return r;
}

function saveRecord(w, d, l) {
  localStorage.setItem('tttRecord', JSON.stringify({w,d,l}));
}

let record = loadRecord();

// 生成赢线
function getWinLines(n) {
  const lines = [];
  for (let r = 0; r < n; r++) { const row = []; for (let c = 0; c < n; c++) row.push(r * n + c); lines.push(row); }
  for (let c = 0; c < n; c++) { const col = []; for (let r = 0; r < n; r++) col.push(r * n + c); lines.push(col); }
  const d1 = []; for (let i = 0; i < n; i++) d1.push(i * n + i); lines.push(d1);
  const d2 = []; for (let i = 0; i < n; i++) d2.push(i * n + (n - 1 - i)); lines.push(d2);
  return lines;
}

// 设置棋盘大小
function setTSize(n) {
  boardSize = n;
  document.getElementById('tSize3').classList.toggle('active', n === 3);
  document.getElementById('tSize4').classList.toggle('active', n === 4);
  document.getElementById('tSize5').classList.toggle('active', n === 5);
  restartGame();
}

// 设置先手/后手
function setOrder(isFirst) {
  playerIsX = isFirst;
  document.getElementById('orderFirst').classList.toggle('active', isFirst);
  document.getElementById('orderSecond').classList.toggle('active', !isFirst);
  restartGame();
}

// 重新开始
function restartGame() {
  board = Array(boardSize * boardSize).fill(null);
  gameOver = false;
  computerThinking = false;
  currentPlayer = 'X';
  renderBoard();
  // 如果玩家后手，电脑先走
  if (!playerIsX) {
    document.getElementById('status').textContent = '电脑思考中...';
    document.getElementById('status').className = 'status thinking';
    computerThinking = true;
    setTimeout(() => computerMove(), 500);
  } else {
    document.getElementById('status').textContent = '你的回合 (X)';
    document.getElementById('status').className = 'status your-turn';
  }
}

// 渲染棋盘
function renderBoard() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  el.className = 'board size-' + boardSize;
  for (let i = 0; i < boardSize * boardSize; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell' + (board[i] ? ' taken' : '');
    if (board[i]) {
      cell.classList.add(board[i] === 'X' ? 'x-cell' : 'o-cell');
      const p = document.createElement('span');
      p.className = 'piece ' + (board[i] === 'X' ? 'x-piece' : 'o-piece');
      p.textContent = board[i];
      cell.appendChild(p);
    }
    cell.addEventListener('click', () => playerMove(i));
    el.appendChild(cell);
  }
}

// 玩家落子
function playerMove(i) {
  if (gameOver || computerThinking) return;
  if (board[i] !== null) return;
  const playerMark = playerIsX ? 'X' : 'O';
  if (currentPlayer !== playerMark) return;

  placePiece(i, playerMark);
  if (checkEnd()) return;

  currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
  computerThinking = true;
  document.getElementById('status').textContent = '电脑思考中...';
  document.getElementById('status').className = 'status thinking';
  setTimeout(() => computerMove(), 350 + Math.random() * 300);
}

// 放置棋子
function placePiece(i, mark) {
  board[i] = mark;
  const cells = document.querySelectorAll('.cell');
  const cell = cells[i];
  cell.classList.add('taken');
  const piece = document.createElement('span');
  piece.className = 'piece ' + (mark === 'X' ? 'x-piece' : 'o-piece');
  piece.textContent = mark;
  cell.appendChild(piece);
}

// 电脑走步
function computerMove() {
  if (gameOver) return;
  const aiMark = playerIsX ? 'O' : 'X';
  let move;
  if (boardSize === 3) {
    move = getBestMove(aiMark);
  } else {
    move = getSmartMove(aiMark);
  }
  if (move === -1) return;
  placePiece(move, aiMark);
  computerThinking = false;
  if (checkEnd()) return;
  currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
  const playerMark = playerIsX ? 'X' : 'O';
  document.getElementById('status').textContent = '你的回合 (' + playerMark + ')';
  document.getElementById('status').className = 'status your-turn';
}

// 3×3 最佳走步（minimax）
function getBestMove(aiMark) {
  let bestScore = -Infinity;
  let bestMove = -1;
  for (let i = 0; i < 9; i++) {
    if (board[i] === null) {
      board[i] = aiMark;
      let score = minimax(board, 0, false, aiMark);
      board[i] = null;
      if (score > bestScore) { bestScore = score; bestMove = i; }
    }
  }
  return bestMove;
}

function minimax(bd, depth, isMaximizing, aiMark) {
  const playerMark = aiMark === 'X' ? 'O' : 'X';
  const winner = getWinner(bd, 3);
  if (winner === aiMark) return 10 - depth;
  if (winner === playerMark) return depth - 10;
  if (bd.every(c => c !== null)) return 0;
  if (isMaximizing) {
    let best = -Infinity;
    for (let i = 0; i < 9; i++) {
      if (bd[i] === null) { bd[i] = aiMark; best = Math.max(best, minimax(bd, depth + 1, false, aiMark)); bd[i] = null; }
    }
    return best;
  } else {
    let best = Infinity;
    for (let i = 0; i < 9; i++) {
      if (bd[i] === null) { bd[i] = playerMark; best = Math.min(best, minimax(bd, depth + 1, true, aiMark)); bd[i] = null; }
    }
    return best;
  }
}

// 4×4 / 5×5 启发式走步
function getSmartMove(aiMark) {
  const playerMark = aiMark === 'X' ? 'O' : 'X';
  const winLines = getWinLines(boardSize);
  const empty = [];
  for (let i = 0; i < board.length; i++) if (board[i] === null) empty.push(i);
  if (empty.length === 0) return -1;

  // 1. 能赢就赢
  for (let line of winLines) {
    let marks = line.map(i => board[i]);
    let myCount = marks.filter(m => m === aiMark).length;
    let emptyCount = marks.filter(m => m === null).length;
    if (myCount === boardSize - 1 && emptyCount === 1) {
      for (let i of line) if (board[i] === null) return i;
    }
  }
  // 2. 堵玩家
  for (let line of winLines) {
    let marks = line.map(i => board[i]);
    let pCount = marks.filter(m => m === playerMark).length;
    let emptyCount = marks.filter(m => m === null).length;
    if (pCount === boardSize - 1 && emptyCount === 1) {
      for (let i of line) if (board[i] === null) return i;
    }
  }
  // 3. 抢中心
  const centerIdx = Math.floor(board.length / 2);
  if (board[centerIdx] === null) return centerIdx;
  // 4. 抢角
  const corners = [0, boardSize - 1, (boardSize - 1) * boardSize, board.length - 1];
  const emptyCorners = corners.filter(i => board[i] === null);
  if (emptyCorners.length > 0) return emptyCorners[Math.floor(Math.random() * emptyCorners.length)];
  // 5. 随机
  return empty[Math.floor(Math.random() * empty.length)];
}

// 判断赢家
function getWinner(bd, n) {
  const winLines = getWinLines(n);
  for (let line of winLines) {
    const first = bd[line[0]];
    if (!first) continue;
    let win = true;
    for (let i of line) { if (bd[i] !== first) { win = false; break; } }
    if (win) return first;
  }
  return null;
}

// 检查游戏是否结束
function checkEnd() {
  const winner = getWinner(board, boardSize);
  if (winner) {
    gameOver = true;
    const playerMark = playerIsX ? 'X' : 'O';
    let result = '';
    if (winner === playerMark) { result = 'win'; record.w++; }
    else { result = 'lose'; record.l++; }
    saveRecord(record.w, record.d, record.l);
    loadRecord();
    showResult(result, winner);
    highlightWin(winner);
    return true;
  }
  if (board.every(c => c !== null)) {
    gameOver = true;
    record.d++;
    saveRecord(record.w, record.d, record.l);
    loadRecord();
    showResult('draw', null);
    return true;
  }
  return false;
}

// 高亮胜利连线
function highlightWin(mark) {
  const winLines = getWinLines(boardSize);
  const cells = document.querySelectorAll('.cell');
  for (let line of winLines) {
    const first = board[line[0]];
    if (!first) continue;
    let win = true;
    for (let i of line) { if (board[i] !== first) { win = false; break; } }
    if (win) { for (let i of line) cells[i].classList.add('win-cell'); return; }
  }
}

// 显示结果
function showResult(result, winner) {
  const status = document.getElementById('status');
  const icon = document.getElementById('resIcon');
  const title = document.getElementById('resTitle');
  const desc = document.getElementById('resDesc');
  if (result === 'win') {
    status.textContent = '🎉 你赢了！';
    status.className = 'status win';
    icon.textContent = '🏆';
    title.textContent = '你赢了！';
    desc.textContent = '太厉害了，击败了人机对手！';
  } else if (result === 'lose') {
    status.textContent = '😔 你输了';
    status.className = 'status lose';
    icon.textContent = '🤖';
    title.textContent = '你输了';
    desc.textContent = '电脑赢了这局，再来挑战！';
  } else {
    status.textContent = '🤝 平局';
    status.className = 'status draw';
    icon.textContent = '🤝';
    title.textContent = '平局！';
    desc.textContent = '势均力敌，不分胜负！';
  }
  setTimeout(() => { document.getElementById('overlay').classList.add('show'); }, 800);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
  // 清除胜利高亮
  document.querySelectorAll('.win-cell').forEach(c => c.classList.remove('win-cell'));
  restartGame();
}

// 初始化
window.addEventListener('DOMContentLoaded', () => {
  restartGame();
});
</script>
