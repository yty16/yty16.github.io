<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>打地鼠 - 工具箱 Pro</title>
<style>
:root{
  --bg:#0f1020; --card:#1a1b2e; --text:#fff; --muted:#888; --accent:#6366f1; --accent2:#818cf8;
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;
  background:radial-gradient(circle at 50% 0%,#1c3d2a,#0f1020);color:var(--text);
  min-height:100vh;padding:calc(20px + var(--safe-top)) 14px calc(20px + var(--safe-bottom));text-align:center;
}
.back{position:fixed;top:calc(12px + var(--safe-top));left:12px;z-index:50;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:var(--text);text-decoration:none;padding:8px 14px;border-radius:10px;font-size:14px;backdrop-filter:blur(8px);}
h1{font-size:20px;font-weight:600;margin:10px 0 6px;}
.bar{display:flex;justify-content:space-around;max-width:380px;margin:0 auto 14px;font-size:15px;}
.bar b{color:var(--accent2);font-size:20px;}
.field{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:380px;margin:0 auto 18px;}
.hole{aspect-ratio:1;border-radius:50%;background:radial-gradient(circle at 50% 30%,#3a2a18,#1c140c);position:relative;overflow:hidden;border:2px solid rgba(0,0,0,0.4);box-shadow:inset 0 6px 12px rgba(0,0,0,0.6);}
.mole{position:absolute;left:50%;bottom:-100%;transform:translateX(-50%);width:72%;height:72%;border-radius:50% 50% 45% 45%;background:radial-gradient(circle at 40% 35%,#a87b4e,#6b4a2c);display:flex;align-items:center;justify-content:center;font-size:30px;transition:bottom .12s ease-out;cursor:pointer;}
.mole.up{bottom:8%;}
.mole.hit{bottom:-100%;}
.btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:14px;padding:13px 34px;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 8px 24px rgba(99,102,241,0.4);font-family:inherit;transition:transform .15s;}
.btn:active{transform:scale(0.94);}
.over{display:none;margin:10px auto;max-width:360px;background:var(--card);border-radius:16px;padding:20px;border:1px solid rgba(255,255,255,0.08);}
.over h2{font-size:20px;margin-bottom:8px;}
@media (max-width:360px){
  .back{top:calc(6px + var(--safe-top));left:6px;padding:6px 10px;font-size:12px;}
  h1{font-size:16px;}
  .field{gap:6px;max-width:300px;}
  .mole{font-size:22px;}
  .btn{padding:11px 28px;font-size:15px;}
}
@media (shape:round){
  .field{width:66vmin;max-width:200px;}
  .mole{font-size:7vmin;}
}
</style>
</head>
<body>
<a href="javascript:history.back()" class="back">← 返回</a>
<h1>🔨 打地鼠</h1>
<div class="bar"><span>得分：<b id="score">0</b></span><span>时间：<b id="time">30</b></span></div>
<div class="field" id="field"></div>
<button class="btn" id="startBtn">开始游戏</button>
<div class="over" id="over"><h2>游戏结束</h2><p>最终得分：<b id="finalScore">0</b></p><button class="btn" id="again" style="margin-top:14px">再来一局</button></div>

<script>
var field=document.getElementById('field'),scoreEl=document.getElementById('score'),timeEl=document.getElementById('time');
var startBtn=document.getElementById('startBtn'),over=document.getElementById('over'),finalScore=document.getElementById('finalScore'),again=document.getElementById('again');
var moles=[],running=false,score=0,timeLeft=30,timer=null,spawnTimer=null;
for(var i=0;i<9;i++){
  var h=document.createElement('div');h.className='hole';
  var m=document.createElement('div');m.className='mole';m.textContent='🐹';
  m.addEventListener('click',function(){hit(this);});
  h.appendChild(m);field.appendChild(h);moles.push(m);
}
function hit(m){
  if(!running||!m.classList.contains('up'))return;
  m.classList.remove('up');m.classList.add('hit');
  score+=10;scoreEl.textContent=score;
  setTimeout(function(){m.classList.remove('hit');},150);
}
function spawn(){
  if(!running)return;
  var up=moles.filter(function(m){return m.classList.contains('up');});
  if(up.length<3){
    var m=moles[Math.floor(Math.random()*moles.length)];
    if(!m.classList.contains('up')){
      m.classList.add('up');
      setTimeout(function(){m.classList.remove('up');},900+Math.random()*500);
    }
  }
}
function start(){
  running=true;score=0;timeLeft=30;scoreEl.textContent='0';timeEl.textContent='30';
  over.style.display='none';startBtn.style.display='none';
  moles.forEach(function(m){m.classList.remove('up','hit');});
  spawnTimer=setInterval(spawn,650);
  timer=setInterval(function(){
    timeLeft--;timeEl.textContent=timeLeft;
    if(timeLeft<=0)end();
  },1000);
}
function end(){
  running=false;clearInterval(timer);clearInterval(spawnTimer);
  moles.forEach(function(m){m.classList.remove('up','hit');});
  finalScore.textContent=score;over.style.display='block';startBtn.style.display='inline-block';startBtn.textContent='重新开始';
}
startBtn.addEventListener('click',start);
again.addEventListener('click',start);
</script>
</body>
</html>
