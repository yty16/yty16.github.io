<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>敲木鱼 - 工具箱 Pro</title>
<style>
:root{
  --bg:#0f1020; --text:#fff; --muted:#888; --accent:#caa15a; --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;
  background:radial-gradient(circle at 50% 35%,#1a1b30,#0a0a14);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:calc(20px + var(--safe-top)) 16px calc(20px + var(--safe-bottom));text-align:center;user-select:none;
}
.back{position:fixed;top:calc(12px + var(--safe-top));left:12px;z-index:50;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:var(--text);text-decoration:none;padding:8px 14px;border-radius:10px;font-size:14px;backdrop-filter:blur(8px);}
.fish{
  width:min(220px,60vw);height:min(220px,60vw);border-radius:50%;cursor:pointer;position:relative;
  background:radial-gradient(circle at 38% 32%,#5a4326,#2c2013 70%);
  box-shadow:0 16px 40px rgba(0,0,0,0.5),inset 0 6px 14px rgba(255,220,160,0.15);
  display:flex;align-items:center;justify-content:center;transition:transform .08s;
}
.fish:active{transform:scale(0.93);}
.fish::before{content:"";position:absolute;width:46%;height:46%;border-radius:50%;background:radial-gradient(circle at 40% 35%,#6b4f2c,#352713);box-shadow:inset 0 4px 8px rgba(0,0,0,0.4);}
.fish .slot{position:absolute;width:18%;height:6px;border-radius:4px;background:rgba(0,0,0,0.45);top:62%;}
.merit{font-size:44px;font-weight:700;margin:24px 0 6px;letter-spacing:2px;}
.merit span{color:var(--accent);}
.tip{color:var(--muted);font-size:14px;margin-bottom:18px;}
.auto{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:var(--text);border-radius:12px;padding:10px 22px;font-size:15px;cursor:pointer;font-family:inherit;}
.auto.on{background:var(--accent);color:#1a1206;font-weight:600;}
.float{position:fixed;font-size:26px;font-weight:700;color:var(--accent);pointer-events:none;opacity:0;transition:opacity .1s,transform 1s ease-out;}
@media (max-width:360px){
  .back{top:calc(6px + var(--safe-top));left:6px;padding:6px 10px;font-size:12px;}
  .fish{width:54vw;height:54vw;}
  .merit{font-size:34px;margin:16px 0 4px;}
  .tip{font-size:12px;margin-bottom:12px;}
  .auto{padding:8px 18px;font-size:13px;}
}
@media (shape:round){
  .fish{width:60vmin;height:60vmin;max-width:160px;max-height:160px;}
}
</style>
</head>
<body>
<a href="javascript:history.back()" class="back">← 返回</a>
<div class="fish" id="fish"><div class="slot"></div></div>
<div class="merit">功德 <span id="count">0</span></div>
<div class="tip">轻敲木鱼，功德+1</div>
<button class="auto" id="autoBtn">自动敲击</button>

<script>
var count=0,countEl=document.getElementById('count'),fish=document.getElementById('fish'),autoBtn=document.getElementById('autoBtn');
var audioCtx=null;
function beep(){
  try{
    if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    var o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=180;o.connect(g);g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.3,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.18);
    o.start();o.stop(audioCtx.currentTime+0.18);
  }catch(e){}
}
function pop(){
  count++;countEl.textContent=count;
  beep();
  var f=document.createElement('div');f.className='float';f.textContent='+1';
  f.style.left=(fish.getBoundingClientRect().left+fish.offsetWidth/2-12)+'px';
  f.style.top=(fish.getBoundingClientRect().top)+'px';
  document.body.appendChild(f);
  requestAnimationFrame(function(){f.style.opacity='1';f.style.transform='translateY(-70px)';});
  setTimeout(function(){f.remove();},1000);
}
fish.addEventListener('click',pop);
var autoTimer=null;
autoBtn.addEventListener('click',function(){
  if(autoTimer){clearInterval(autoTimer);autoTimer=null;autoBtn.classList.remove('on');autoBtn.textContent='自动敲击';}
  else{autoTimer=setInterval(pop,350);autoBtn.classList.add('on');autoBtn.textContent='停止敲击';}
});
</script>
</body>
</html>
