<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>屏幕画板</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;-webkit-user-select:none;user-select:none;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
        canvas{display:block;width:100%;height:100%;cursor:crosshair;position:absolute;top:0;left:0;}
        .back-btn{position:fixed;top:calc(8px + env(safe-area-inset-top,0px));left:calc(8px + env(safe-area-inset-left,0px));z-index:10;background:rgba(30,30,30,0.85);border:none;color:#fff;padding:5px 10px;border-radius:12px;font-size:13px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px;}
        .toolbar{position:fixed;bottom:calc(8px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);display:flex;gap:5px;padding:5px 8px;background:rgba(30,30,30,0.9);border-radius:18px;z-index:10;flex-wrap:wrap;justify-content:center;max-width:92vw;}
        .tb{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;-webkit-tap-highlight-color:transparent;}
        .tb:active{transform:scale(0.85)}
        .tb-color{border:2px solid rgba(255,255,255,0.2)}
        .tb-color.active{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,0.5)}
        .tb-tool{background:rgba(255,255,255,0.1);color:#fff;font-size:16px}
        .tb-tool.active{background:#2563eb}
        .tb-action{background:rgba(255,255,255,0.1);color:#fff;font-size:12px;width:auto;padding:0 10px;border-radius:16px}
        @media (shape: round){
            .toolbar{bottom:calc(24px + env(safe-area-inset-bottom,0px));max-width:70vw;}
            .back-btn{top:calc(20px + env(safe-area-inset-top,0px));left:calc(22px + env(safe-area-inset-left,0px));}
            .tb{width:28px;height:28px;font-size:13px;}
        }
        @media (max-width: 200px){
            .tb{width:26px;height:26px;font-size:11px;}
            .toolbar{gap:3px;padding:4px 6px;}
        }
    </style>
</head>
<body>
    <a class="back-btn" href="index.html">← 返回</a>
    <canvas id="canvas"></canvas>
    <div class="toolbar" id="toolbar">
        <button class="tb tb-color active" style="background:#fff;" data-color="#fff"></button>
        <button class="tb tb-color" style="background:#2563eb;" data-color="#2563eb"></button>
        <button class="tb tb-color" style="background:#ef4444;" data-color="#ef4444"></button>
        <button class="tb tb-color" style="background:#22c55e;" data-color="#22c55e"></button>
        <button class="tb tb-color" style="background:#f59e0b;" data-color="#f59e0b"></button>
        <button class="tb tb-tool active" data-tool="pen" title="画笔">✏️</button>
        <button class="tb tb-tool" data-tool="eraser" title="橡皮">🧹</button>
        <button class="tb tb-action" onclick="clearCanvas()">清除</button>
    </div>
<script>
(function(){
var hosts=['yty16.github.io','yty16.pages.dev'];
if(hosts.indexOf(location.hostname)===-1){document.body.innerHTML='<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;color:#666;">页面无法显示</div>';return;}

var canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
var drawing=false,color='#fff',tool='pen',lineWidth=3;
var lastX=0,lastY=0;

function resize(){
    var dpr=window.devicePixelRatio||1;
    var imgData=null;
    try{imgData=ctx.getImageData(0,0,canvas.width,canvas.height);}catch(e){}
    canvas.width=window.innerWidth*dpr;
    canvas.height=window.innerHeight*dpr;
    canvas.style.width=window.innerWidth+'px';
    canvas.style.height=window.innerHeight+'px';
    ctx.scale(dpr,dpr);
    if(imgData){
        try{ctx.putImageData(imgData,0,0);}catch(e){}
    }
}
resize();
window.addEventListener('resize',resize);

function getPos(e){var t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY};}

canvas.addEventListener('touchstart',function(e){e.preventDefault();drawing=true;var p=getPos(e);lastX=p.x;lastY=p.y;if(tool==='pen'){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.strokeStyle=color;ctx.lineWidth=lineWidth;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();}},{passive:false});
canvas.addEventListener('touchmove',function(e){e.preventDefault();if(!drawing)return;var p=getPos(e);
if(tool==='pen'){ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);ctx.strokeStyle=color;ctx.lineWidth=lineWidth;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();}
else if(tool==='eraser'){ctx.clearRect(p.x-10,p.y-10,20,20);}
lastX=p.x;lastY=p.y;},{passive:false});
canvas.addEventListener('touchend',function(){drawing=false;});

// Mouse support
canvas.addEventListener('mousedown',function(e){drawing=true;var p=getPos(e);lastX=p.x;lastY=p.y;if(tool==='pen'){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.strokeStyle=color;ctx.lineWidth=lineWidth;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();}});
canvas.addEventListener('mousemove',function(e){if(!drawing)return;var p=getPos(e);
if(tool==='pen'){ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);ctx.strokeStyle=color;ctx.lineWidth=lineWidth;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();}
else if(tool==='eraser'){ctx.clearRect(p.x-10,p.y-10,20,20);}
lastX=p.x;lastY=p.y;});
canvas.addEventListener('mouseup',function(){drawing=false;});

document.getElementById('toolbar').addEventListener('click',function(e){
    var btn=e.target.closest('button');if(!btn)return;
    if(btn.dataset.color){
        document.querySelectorAll('.tb-color').forEach(function(b){b.classList.remove('active');});
        btn.classList.add('active');color=btn.dataset.color;tool='pen';
        document.querySelectorAll('.tb-tool').forEach(function(b){b.classList.remove('active');});
        document.querySelector('.tb-tool[data-tool="pen"]').classList.add('active');
    }
    if(btn.dataset.tool){
        document.querySelectorAll('.tb-tool').forEach(function(b){b.classList.remove('active');});
        btn.classList.add('active');tool=btn.dataset.tool;
    }
});

window.clearCanvas=function(){ctx.clearRect(0,0,canvas.width,canvas.height);};
})();
</script>
</body>
</html>
