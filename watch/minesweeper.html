<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>扫雷</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#000;--surface:#111;--surface2:#1a1a1a;--text:#fff;--text2:#999;--accent:#2563eb;--danger:#ef4444;--success:#22c55e;--warn:#f59e0b;
            --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
        html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;}
        .app{display:flex;flex-direction:column;align-items:center;height:100%;padding:calc(4px + var(--safe-top)) 6px calc(4px + var(--safe-bottom));}
        @media (shape: round){
            .app{padding:calc(20px + var(--safe-top)) 24px calc(20px + var(--safe-bottom));}
        }
        .header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:260px;padding:2px 0;flex-shrink:0;}
        .back-btn{background:none;border:none;color:var(--accent);font-size:15px;cursor:pointer;padding:4px 8px;text-decoration:none;}
        .title{font-size:14px;font-weight:600;}
        .info{display:flex;gap:8px;font-size:12px;color:var(--text2);}
        .info span{color:var(--accent);font-weight:600;}
        .status{text-align:center;font-size:16px;margin:2px 0;min-height:20px;}
        .grid-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;}
        .grid{display:grid;gap:2px;padding:3px;background:var(--surface);border-radius:10px;}
        .cell{aspect-ratio:1;background:var(--surface2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.1s;min-width:0;min-height:0;}
        .cell:active{transform:scale(0.9)}
        .cell.revealed{background:#222;cursor:default}
        .cell.revealed:active{transform:none}
        .cell.flag{background:#331111}
        .cell.mine{background:var(--danger)}
        .cell[data-n="1"]{color:#4fc3f7}.cell[data-n="2"]{color:#81c784}.cell[data-n="3"]{color:#ef5350}.cell[data-n="4"]{color:#ab47bc}.cell[data-n="5"]{color:#ff8f00}.cell[data-n="6"]{color:#00bcd4}.cell[data-n="7"]{color:#e91e63}.cell[data-n="8"]{color:#9e9e9e}
        .footer{display:flex;gap:8px;padding:4px 0;flex-shrink:0;}
        .btn{background:var(--surface2);border:none;color:var(--text);padding:6px 12px;border-radius:12px;font-size:13px;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;}
        .btn:active{background:var(--accent)}
        .btn.primary{background:var(--accent)}
        @media (shape: round){
            .header{max-width:200px;}
            .title{font-size:13px;}
            .info{font-size:11px;}
            .btn{padding:5px 10px;font-size:12px;}
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <a class="back-btn" href="index.html">←</a>
        <span class="title">💣 扫雷</span>
        <div class="info">💣<span id="mineCount">8</span></div>
    </div>
    <div class="status" id="status"></div>
    <div class="grid-wrap">
        <div class="grid" id="grid"></div>
    </div>
    <div class="footer">
        <button class="btn" onclick="newGame()">🔄 新游戏</button>
        <button class="btn primary" onclick="toggleFlag()" id="flagBtn">🚩 标记</button>
    </div>
</div>
<script>
(function(){
var hosts=['yty16.github.io','yty16.pages.dev'];
if(hosts.indexOf(location.hostname)===-1){document.body.innerHTML='<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;color:#666;">页面无法显示</div>';return;}

var gridEl=document.getElementById('grid'),statusEl=document.getElementById('status'),mineCountEl=document.getElementById('mineCount'),flagBtn=document.getElementById('flagBtn');
var rows=7,cols=6,mines=6;
var board=[],revealed=[],flagged=[],gameOver=false,flagMode=false,revealedCount=0,flagCount=0;

function calcSize(){
    var isRound=false;
    try{isRound=window.matchMedia('(shape: round)').matches;}catch(e){}
    var maxW = isRound ? Math.min(window.innerWidth*0.62, 180) : Math.min(window.innerWidth-16, 260);
    var maxH = window.innerHeight - 100;
    var cellByW = Math.floor((maxW-6)/cols);
    var cellByH = Math.floor((maxH-6)/rows);
    return Math.max(18, Math.min(cellByW, cellByH, 40));
}

function init(){
    board=[];revealed=[];flagged=[];gameOver=false;revealedCount=0;flagCount=0;flagMode=false;
    flagBtn.textContent='🚩 标记';flagBtn.className='btn primary';
    statusEl.textContent='';
    var cellSize=calcSize();
    gridEl.style.gridTemplateColumns='repeat('+cols+', '+cellSize+'px)';
    for(var r=0;r<rows;r++){board[r]=[];revealed[r]=[];flagged[r]=[];
        for(var c=0;c<cols;c++){board[r][c]=0;revealed[r][c]=false;flagged[r][c]=false;}}
    var placed=0;
    while(placed<mines){var rr=Math.floor(Math.random()*rows),cc=Math.floor(Math.random()*cols);if(board[rr][cc]!==-1){board[rr][cc]=-1;placed++;}}
    for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){if(board[r][c]===-1)continue;var count=0;
        for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){var nr=r+dr,nc=c+dc;if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&board[nr][nc]===-1)count++;}
        board[r][c]=count;}
    mineCountEl.textContent=mines-flagCount;
    render();
}
function render(){
    gridEl.innerHTML='';
    for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
        var cell=document.createElement('div');cell.className='cell';
        if(revealed[r][c]){cell.classList.add('revealed');
            if(board[r][c]===-1){cell.classList.add('mine');cell.textContent='💣';}
            else if(board[r][c]>0){cell.setAttribute('data-n',board[r][c]);cell.textContent=board[r][c];}
        }else if(flagged[r][c]){cell.classList.add('flag');cell.textContent='🚩';}
        (function(ri,ci){cell.addEventListener('click',function(e){clickCell(ri,ci);});})(r,c);
        gridEl.appendChild(cell);
    }
}
function clickCell(r,c){
    if(gameOver||revealed[r][c])return;
    if(flagMode){if(!flagged[r][c]){flagged[r][c]=true;flagCount++;}else{flagged[r][c]=false;flagCount--;}mineCountEl.textContent=mines-flagCount;render();return;}
    if(flagged[r][c])return;
    reveal(r,c);
    if(gameOver)return;
    if(board[r][c]===0)floodFill(r,c);
    if(revealedCount===rows*cols-mines){gameOver=true;statusEl.textContent='🎉 你赢了!';render();}
}
function reveal(r,c){if(revealed[r][c])return;revealed[r][c]=true;revealedCount++;if(board[r][c]===-1){gameOver=true;revealAll();statusEl.textContent='💥 炸了!';}}
function floodFill(r,c){
    var queue=[[r,c]];
    while(queue.length>0){
        var pos=queue.shift();
        var cr=pos[0],cc=pos[1];
        for(var dr=-1;dr<=1;dr++)for(var dc=-1;dc<=1;dc++){
            var nr=cr+dr,nc=cc+dc;
            if(nr>=0&&nr<rows&&nc>=0&&nc<cols&&!revealed[nr][nc]&&!flagged[nr][nc]&&board[nr][nc]!==-1){
                reveal(nr,nc);
                if(board[nr][nc]===0)queue.push([nr,nc]);
            }
        }
    }
    render();
}
function revealAll(){for(var r=0;r<rows;r++)for(var c=0;c<cols;c++)revealed[r][c]=true;render();}
function toggleFlag(){flagMode=!flagMode;flagBtn.textContent=flagMode?'🚩 标记中':'🚩 标记';flagBtn.className=flagMode?'btn':'btn primary';}
window.newGame=init;window.toggleFlag=toggleFlag;
window.addEventListener('resize',function(){init();});
init();
})();
</script>
</body>
</html>
